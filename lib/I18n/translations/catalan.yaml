STR_README_TOPIC_SHORTCUTS: "Personalitza la llar i les aplicacions"
STR_README_SYNC_DAY_BODY: "L'Xteink X4 no s'ha de tractar com si tingués un rellotge en temps real fiable que sobreviu al son d'una manera fiable. Per tant, aquesta forquilla utilitza un model pràctic:\n\n1. Sync Day es connecta per Wi-Fi i obté la data/hora actuals mitjançant NTP.\n2. Aquesta data esdevé la referència vàlida per a les estadístiques.\n3. Si més tard el dispositiu perd un rellotge actual vàlid, el microprogramari tornarà a la darrera data vàlida desada.\n4. Quan la capçalera mostra una data alternativa en lloc d'una nova data sincronitzada, es marca amb !.\n\nSignificat pràctic:\n- Normalment n'hi ha prou amb una sincronització al dia abans de llegir\n- després d'això, les estadístiques continuen utilitzant l'últim dia desat vàlid\n- Si el dia real canvia, hauríeu de tornar a sincronitzar-vos\n\nPer defecte, la zona horària és \"Espanya / Madrid\". Podeu seleccionar la vostra zona horària i el format de data a Configuració > Aplicacions."
STR_README_STATS_BODY: "Regles:\n- Cal connectar-se al Wi‑Fi 1 cop al dia.\n- Calen com a mínim 3 minuts de lectura perquè es comptin dades.\n\nPer poder registrar estadístiques cal identificar el dia.\n1. Configura prèviament la connexió Wi‑Fi.\n2. Prem 1 cop al dia (abans de llegir) el botó Sync Day.\nDesprés de Sync Day, tota l'activitat es registrarà en aquell dia fins que tornis a prémer Sync Day l'endemà.\n3. Gaudeix de \"Reading Stats\", \"Reading Heatmap\".\n4. Opcional. A \"Settings > Apps > Reading Stats\" podràs personalitzar, reiniciar i modificar les estadístiques.\n\nOpcional: si vols tenir llibres sense estadístiques, crea un directori anomenat /ignore_stats/ i posa-hi els teus EPUB."
STR_README_BOOKMARKS_BODY: "Mentre un llibre està obert:\n- Si manteniu premuda la tecla d'acord inferior, la pàgina actual es desa com a marcador.\n- Si toqueu la mateixa tecla ràpidament, s'obre un menú perquè pugueu comprovar ràpidament les adreces d'interès.\n- Per suprimir un marcador, torneu a mantenir premut el mateix botó mentre el marcador estigui seleccionat."
STR_README_SLEEP_BODY: "Personalitzeu les pantalles de son tant com vulgueu.\nPodeu tenir diferents directoris, triar quin utilitzar, navegar per les imatges lentament i fins i tot decidir si l'ordre és aleatori o seqüencial.\n\nPodeu crear carpetes addicionals sempre que comencin per sleep_, per exemple: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "A Configuració > Aplicacions > Dreceres podeu:\n- tria quines aplicacions es mostren a Inici o a Aplicacions\n- Canvieu l'ordre de qualsevol aplicació a les dues pantalles"
STR_README_ACHIEVEMENTS_BODY: "Recordeu utilitzar el Dia de sincronització cada dia perquè la majoria dels assoliments es puguin fer un seguiment correcte.\nAchievements és un sistema de gamificació senzill amb objectius de lectura i fites per desbloquejar."
STR_README_IF_FOUND_BODY: "Una aplicació que ajuda algú a tornar el dispositiu si es perd.\n\nEscriure en aquest dispositiu és dolorós, de manera que si afegiu un fitxer anomenat if_found.txt a la targeta SD, el seu contingut es mostrarà quan s'obri aquesta aplicació.\n\nHi pots escriure el que vulguis: una frase, un número de telèfon, un correu electrònic..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
