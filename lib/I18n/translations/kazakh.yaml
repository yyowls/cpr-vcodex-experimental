STR_README_TOPIC_SHORTCUTS: "Үй мен қолданбаларды теңшеңіз"
STR_README_SYNC_DAY_BODY: "Xteink X4 оны ұйқы кезінде сенімді түрде сақтайтын сенімді нақты уақыт сағаты бар сияқты қарастыруға болмайды. Сонымен, бұл шанышқы практикалық үлгіні пайдаланады:\n\n1. Синхрондау күні Wi-Fi арқылы қосылады және NTP арқылы ағымдағы күнді/уақытты алады.\n2. Бұл күн статистика үшін жарамды сілтеме болады.\n3. Құрылғы кейінірек жарамды ағымдағы сағатты жоғалтса, микробағдарлама соңғы сақталған жарамды күнге қайтады.\n4. Тақырып жаңа синхрондалған күннің орнына қалпына келтіру күнін көрсеткенде, ол ! белгісімен белгіленеді.\n\nПрактикалық мағынасы:\n- әдетте оқу алдында күніне бір синхрондау жеткілікті\n- одан кейін статистика соңғы жарамды сақталған күнді пайдалануды жалғастырады\n- егер нақты күн өзгерсе, қайта синхрондау керек\n\nӘдепкі бойынша уақыт белдеуі \"Испания / Мадрид\" болып табылады. Параметрлер > Қолданбалар тармағында жеке уақыт белдеуі мен күн пішімін таңдауға болады."
STR_README_STATS_BODY: "Ережелер:\n- Wi-Fi желісіне күніне 1 рет қосылу керек.\n- Деректер есептелуі үшін кемінде 3 минут оқу қажет.\n\nСтатистиканы тіркеу үшін алдымен күн анықталуы керек.\n1. Wi-Fi қосылымын алдын ала баптаңыз.\n2. Күніне 1 рет (оқудан бұрын) Sync Day түймесін басыңыз.\nSync Day басылғаннан кейін бүкіл әрекет келесі күні Sync Day түймесін қайта басқанға дейін сол күнге жазылады.\n3. \"Reading Stats\", \"Reading Heatmap\" мүмкіндіктерін пайдаланыңыз.\n4. Қосымша. \"Settings > Apps > Reading Stats\" ішінде статистиканы баптауға, қалпына келтіруге және өзгертуге болады.\n\nҚосымша: егер статистикасыз кітаптар керек болса, /ignore_stats/ атты каталог жасап, EPUB файлдарыңызды соған салыңыз."
STR_README_PROFILE_BODY: "Оқу профилі - сіздің оқу әдеттеріңіздің 7 күндік суреті.\n\nОл төрт осьті анықтайды:\n- Әдет: қаншалықты жиі оқисыз және күнделікті мақсатыңызға жетесіз\n- Тұрақтылық: оқуыңыз апта бойына қаншалықты біркелкі тарады\n- Қатысу: басқа сессияға қаншалықты жиі оралдыңыз\n- Тереңдігі: сеанстарыңыз негізінен қысқа, орташа немесе ұзақ болды ма\n\nЖалпы балл - бұл қорытынды. Төрт ось сіздің үлгіңізді шынымен түсіндіреді."
STR_README_BOOKMARKS_BODY: "Кітап ашық болған кезде:\n- Төменгі OK пернесін басып тұрсаңыз, ағымдағы бет бетбелгі ретінде сақталады.\n- Егер бір пернені жылдам түртсеңіз, бетбелгілерді жылдам тексеруге болатын мәзір ашылады.\n- Бетбелгіні жою үшін бетбелгі таңдалған кезде сол түймені қайта басып тұрыңыз."
STR_README_FAVORITES_BODY: "Таңдаулылар жылдам қол жеткізгіңіз келетін кітаптарды бекітуге мүмкіндік береді.\n\nБұл қалай жұмыс істейді:\n- Таңдаулылар > Файлдарды шолу\\ тармағын ашыңыз\n- кәдімгі файл шолғышы сияқты қалталар арқылы жылжытыңыз\n- әрбір кітапты оң жақтағы құсбелгімен белгілеуге немесе алып тастауға болады\n\nТаңдаулыларды басқару:\n- Таңдаулылар > Таңдаулыларға тапсырыс беру қай кітаптар бірінші болып шығатынын қолмен таңдауға мүмкіндік береді\n- өшіргіңіз келсе, сол жерде таңдаулы таңдау түймесін басып тұрыңыз, содан кейін растаңыз\n- қанша таңдаулыларды сақтауға болатынына нақты шектеу жоқ\n\nҚосымша:\n- Параметрлер > Дисплей > Карусель тармағында Үйге соңғы кітаптардың орнына бірінші таңдаулы кітаптарыңызды көрсетуін қаласаңыз, Таңдаулылар тармағын таңдаңыз."
STR_README_FLASHCARDS_BODY: "Flashcards SD картасында сақталған CSV палубаларын зерттейді.\n\nНегізгі бөлімдер:\n- Ашық палубаны қоймадан жүктейді\n- Соңғылар сіз жақында пайдаланған палубаларды қайта ашады\n- Статистика белгілі палубаларды және олардың орындалу барысын көрсетеді\n- Параметрлер оқу режимін және сеанс өлшемін таңдауға мүмкіндік береді\n\nОқу режимдері:\n- Due бірінші кезекте төленетін карталардан, ал екінші рет көрінбейтін карталардан шектеулі шолу сеансын жасайды\n- Жоспарланған бүкіл палубадан ақырғы аралас сеанс жасайды\n- Infinite сеанс өлшемін елемейді және сіз қолмен кеткенше жұмысын жалғастыра береді\n\nОпциялар қалай жұмыс істейді:\n- Оқу режимі сеансқа қандай карталар кіретінін шешеді\n- Сеанс өлшемі сол карталардың қаншасы пайдаланылатынын анықтайды\n- Сеанс өлшемі Барлығы болса, Due барлық төлеуге және көрінбейтін карталарды пайдаланады, ал Жоспарланған барлық палубаны пайдаланады\n\nҚарау кезінде:\n- Алдыңғы және артқы жағын ауыстыру\n- Енді ағымдағы картаны ұпайсыз өткізіп жібереді\n- Сәттілік картаны дұрыс деп белгілейді\n- Fail картаны сәтсіз деп белгілеп, оны тезірек қайтарады\n\n«Статистика» ішіндегі палубада «Таңдау» түймесін басып тұрсаңыз, растаудан кейін сол палубаның флэш-карта статистикасын жоюға болады."
STR_README_SLEEP_BODY: "Ұйқы экрандарын қалауыңызша реттеңіз.\nСізде әртүрлі каталогтар болуы мүмкін, қайсысын пайдалану керектігін таңдау, суреттерді баяу шолу және тіпті тапсырыстың кездейсоқ немесе дәйекті екенін шешуге болады.\n\nҚосымша қалталар ұйқы_ деп басталатын болса, жасауға болады, мысалы: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "\"Параметрлер > Қолданбалар > Таңбашалар\" бөлімінде \"Үй\" және \"Қолданбалар\" бөлімін реттей аласыз.\n\nСіз жасай аласыз:\n- әрбір қолданбаның Home немесе Apps-ке тиесілілігін шешіңіз\n- әрбір таңбашаны көрсету немесе жасыру\n- екі экрандағы элементтердің ретін өзгерту\n\nБұл іске қосқышты қарапайым ұстаудың ең оңай жолы."
STR_README_SETTINGS_BODY: "Кейбір параметрлер жылдам түсіндіруге лайық:\n\nОқырман\n- Мәтінді антиалиасинг мәтінді тегістейді, бірақ жылдамдығы аз болуы мүмкін\n- Мәтін қараңғылығы қараңғы мәтіннің көрінісін өзгертеді\n- Оқу құралын жаңарту режимі жаңарту мәнерін өзгертеді; Авто — қауіпсіз әдепкі\n- Қаріптер тобы мен өлшемі әдетте ыңғайлы болу үшін UI тақырыбына қарағанда маңызды.\n\nҚолданбалар\n- Күнді көрсету тақырыбы тақырыпта күнді көрсетеді немесе жасырады\n- Күн пішімі тек күннің қалай көрсетілетінін өзгертеді\n- Күнделікті мақсат жолдарға, статистикаға және жетістіктерге әсер етеді\n- Оқудан кейін көрсету Есептік сеанстан кейін оқу статистикасын ашады\n- Жетістіктерді қосу жетістік жүйесін қосады немесе өшіреді\n- Жетістіктер қалқымалы терезелері тек құлпын ашу қалқымалы терезелерін басқарады\n\nДисплей\n- UI тақырыбы тек интерфейс көрінісін өзгертеді"
STR_README_ACHIEVEMENTS_BODY: "Көптеген жетістіктерді дұрыс бақылау үшін Синхрондау күнін күн сайын пайдалануды ұмытпаңыз.\nЖетістіктер – оқу мақсаттары мен құлпын ашуға болатын кезеңдері бар қарапайым геймификация жүйесі."
STR_README_IF_FOUND_BODY: "Құрылғы жоғалған жағдайда оны қайтаруға көмектесетін қолданба.\n\nБұл құрылғыда теру ауыр, сондықтан SD картасына if_found.txt деп аталатын файлды қоссаңыз, оның мазмұны осы қолданба ашылғанда көрсетіледі.\n\nОнда сіз қалаған нәрсені жаза аласыз: сөйлем, телефон нөмірі, электрондық пошта..."
