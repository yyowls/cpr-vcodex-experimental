STR_README: "ReadMe"
STR_README_APP_DESC: "Негізгі vCodex мүмкіндіктеріне арналған жылдам нұсқаулық"
STR_README_GITHUB_HINT: "Толығырақ GitHub @franssjz сайтында"
STR_README_TOPIC_SHORTCUTS: "Үй мен қолданбаларды теңшеңіз"
STR_README_SYNC_DAY_BODY: "Xteink X4 оны ұйқы кезінде сенімді түрде сақтайтын сенімді нақты уақыт сағаты бар сияқты қарастыруға болмайды. Сонымен, бұл шанышқы практикалық үлгіні пайдаланады:\n\n1. Синхрондау күні Wi-Fi арқылы қосылады және NTP арқылы ағымдағы күнді/уақытты алады.\n2. Бұл күн статистика үшін жарамды сілтеме болады.\n3. Құрылғы кейінірек жарамды ағымдағы сағатты жоғалтса, микробағдарлама соңғы сақталған жарамды күнге қайтады.\n4. Тақырып жаңа синхрондалған күннің орнына қалпына келтіру күнін көрсеткенде, ол ! белгісімен белгіленеді.\n\nПрактикалық мағынасы:\n- әдетте оқу алдында күніне бір синхрондау жеткілікті\n- одан кейін статистика соңғы жарамды сақталған күнді пайдалануды жалғастырады\n- егер нақты күн өзгерсе, қайта синхрондау керек\n\nӘдепкі бойынша уақыт белдеуі \"Испания / Мадрид\" болып табылады. Параметрлер > Қолданбалар тармағында жеке уақыт белдеуі мен күн пішімін таңдауға болады."
STR_README_STATS_BODY: "Ережелер:\n- Wi-Fi желісіне күніне 1 рет қосылу керек.\n- Деректер есептелуі үшін кемінде 3 минут оқу қажет.\n\nСтатистиканы тіркеу үшін алдымен күн анықталуы керек.\n1. Wi-Fi қосылымын алдын ала баптаңыз.\n2. Күніне 1 рет (оқудан бұрын) Sync Day түймесін басыңыз.\nSync Day басылғаннан кейін бүкіл әрекет келесі күні Sync Day түймесін қайта басқанға дейін сол күнге жазылады.\n3. \"Reading Stats\", \"Reading Heatmap\" мүмкіндіктерін пайдаланыңыз.\n4. Қосымша. \"Settings > Apps > Reading Stats\" ішінде статистиканы баптауға, қалпына келтіруге және өзгертуге болады.\n\nҚосымша: егер статистикасыз кітаптар керек болса, /ignore_stats/ атты каталог жасап, EPUB файлдарыңызды соған салыңыз."
STR_README_BOOKMARKS_BODY: "Кітап ашық болған кезде:\n- Төменгі OK пернесін басып тұрсаңыз, ағымдағы бет бетбелгі ретінде сақталады.\n- Егер бір пернені жылдам түртсеңіз, бетбелгілерді жылдам тексеруге болатын мәзір ашылады.\n- Бетбелгіні жою үшін бетбелгі таңдалған кезде сол түймені қайта басып тұрыңыз."
STR_README_SLEEP_BODY: "Ұйқы экрандарын қалауыңызша реттеңіз.\nСізде әртүрлі каталогтар болуы мүмкін, қайсысын пайдалану керектігін таңдау, суреттерді баяу шолу және тіпті тапсырыстың кездейсоқ немесе дәйекті екенін шешуге болады.\n\nҚосымша қалталар ұйқы_ деп басталатын болса, жасауға болады, мысалы: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Параметрлер > Қолданбалар > Таңбашалар бөлімінде мына әрекеттерді орындауға болады:\n- Home немесе Apps ішінде қандай қолданбалар көрсетілетінін таңдаңыз\n- екі экрандағы кез келген қолданбаның ретін өзгерту"
STR_README_ACHIEVEMENTS_BODY: "Көптеген жетістіктерді дұрыс бақылау үшін Синхрондау күнін күн сайын пайдалануды ұмытпаңыз.\nЖетістіктер – оқу мақсаттары мен құлпын ашуға болатын кезеңдері бар қарапайым геймификация жүйесі."
STR_README_IF_FOUND_BODY: "Құрылғы жоғалған жағдайда оны қайтаруға көмектесетін қолданба.\n\nБұл құрылғыда теру ауыр, сондықтан SD картасына if_found.txt деп аталатын файлды қоссаңыз, оның мазмұны осы қолданба ашылғанда көрсетіледі.\n\nОнда сіз қалаған нәрсені жаза аласыз: сөйлем, телефон нөмірі, электрондық пошта..."
