STR_README_SYNC_DAY_BODY: "Xteink X4 ska inte behandlas som om den hade en pÃċlitlig realtidsklocka som Ã¶verlever sÃ¶mnen pÃċ ett tillfÃ¶rlitligt sÃĊtt. SÃċ den hÃĊr gaffeln anvÃĊnder en praktisk modell:\n\n1. Sync Day ansluter via Wi-Fi och hÃĊmtar aktuellt datum/tid med NTP.\n2. Det datumet blir den giltiga referensen fÃ¶r statistik.\n3. Om enheten senare tappar en giltig aktuell klocka, faller den fasta programvaran tillbaka till det senast sparade giltiga datumet.\n4. NÃĊr rubriken visar ett reservdatum istÃĊllet fÃ¶r ett nytt synkroniserat datum ÃĊr det markerat med !.\n\nPraktisk betydelse:\n- en synkning per dag innan lÃĊsning brukar rÃĊcka\n- efter det fortsÃĊtter statistiken att anvÃĊnda den senast giltiga sparade dagen\n- om den verkliga dagen ÃĊndras bÃ¶r du synkronisera igen\n\nSom standard ÃĊr tidszonen \"Spanien / Madrid\". Du kan vÃĊlja din egen tidszon och datumformat i InstÃĊllningar > Appar."
STR_README_STATS_BODY: "Regler:\n- Du mÃċste ansluta till WiâFi 1 gÃċng per dag.\n- Minst 3 minuters lÃĊsning krÃĊvs fÃ¶r att data ska rÃĊknas.\n\nFÃ¶r att kunna registrera statistik mÃċste dagen fÃ¶rst identifieras.\n1. Konfigurera WiâFi-anslutningen i fÃ¶rvÃĊg.\n2. Tryck 1 gÃċng per dag (innan du lÃĊser) pÃċ knappen Sync Day.\nEfter Sync Day registreras all aktivitet pÃċ den dagen tills du trycker pÃċ Sync Day igen nÃĊsta dag.\n3. Njut av \"Reading Stats\", \"Reading Heatmap\".\n4. Valfritt. I \"Settings > Apps > Reading Stats\" kan du anpassa, ÃċterstÃĊlla och ÃĊndra statistiken.\n\nValfritt: om du vill ha bÃ¶cker utan statistik, skapa en mapp som heter /ignore_stats/ och lÃĊgg dina EPUB-filer dÃĊr."
STR_README_PROFILE_BODY: "LÃĊsprofil ÃĊr en 7-dagars Ã¶gonblicksbild av dina lÃĊsvanor.\n\nDen fÃċr fyra axlar:\n- Vana: hur ofta du lÃĊser och nÃċdde ditt dagliga mÃċl\n- Stabilitet: hur jÃĊmnt din lÃĊsning fÃ¶rdelades Ã¶ver veckan\n- Engagemang: hur ofta kom du tillbaka fÃ¶r en annan session\n- Djup: om dina sessioner mestadels var korta, medelstora eller lÃċnga\n\nTotalpoÃĊngen ÃĊr bara en sammanfattning. De fyra axlarna ÃĊr det som verkligen fÃ¶rklarar ditt mÃ¶nster."
STR_README_BOOKMARKS_BODY: "Medan en bok ÃĊr Ã¶ppen:\n- Om du hÃċller ned den nedre OK-tangenten sparas den aktuella sidan som ett bokmÃĊrke.\nâ Om du trycker pÃċ samma knapp snabbt Ã¶ppnas en meny sÃċ att du snabbt kan kontrollera bokmÃĊrken.\n- FÃ¶r att radera ett bokmÃĊrke, hÃċll nere samma knapp igen medan bokmÃĊrket ÃĊr valt."
STR_README_FAVORITES_BODY: "Med Favoriter kan du fÃĊsta bÃ¶cker som du vill ha snabb Ãċtkomst till.\n\nHur det fungerar:\n- Ã¶ppna Favoriter > BlÃĊddra bland filer\n- gÃċ igenom mappar som en vanlig fillÃĊsare\n- varje bok kan markeras eller avmarkeras med kryssrutan till hÃ¶ger\n\nHantera favoriter:\n- Favoriter > BestÃĊll favoriter lÃċter dig manuellt vÃĊlja vilka bÃ¶cker som ska visas fÃ¶rst\n- hÃċll VÃĊlj pÃċ en favorit dÃĊr om du vill ta bort den, bekrÃĊfta sedan\n- det finns ingen fast grÃĊns fÃ¶r hur mÃċnga favoriter du kan behÃċlla\n\nValfritt:\n- i InstÃĊllningar > Display > Karusell, vÃĊlj Favoriter om du vill att Hem ska visa dina fÃ¶rsta favoritbÃ¶cker istÃĊllet fÃ¶r de senaste."
STR_README_FLASHCARDS_BODY: "Flashcards studerar CSV-kort som lagras pÃċ SD-kortet.\n\nHuvudsektioner:\n- Ãppna laddar en kortlek frÃċn fÃ¶rvaringen\n- Recents ÃċterÃ¶ppnar dÃĊck du nyligen anvÃĊnde\n- Statistik listar kÃĊnda kortlekar och deras framsteg\n- InstÃĊllningar lÃċter dig vÃĊlja studielÃĊge och sessionsstorlek\n\nStudielÃĊgen:\n- Due bygger en ÃĊndlig granskningssession frÃċn fÃ¶rfallna kort fÃ¶rst och osynliga kort andra\n- Schemalagt bygger en ÃĊndlig blandad session frÃċn hela leken\n- Infinite ignorerar sessionsstorlek och fortsÃĊtter tills du lÃĊmnar manuellt\n\nHur alternativen fungerar:\n- StudielÃĊge avgÃ¶r vilka kort som kommer in i sessionen\n- Sessionsstorleken avgÃ¶r hur mÃċnga av dessa kort som anvÃĊnds\n- Om sessionsstorleken ÃĊr Alla, anvÃĊnder Due alla fÃ¶rfallna plus osynliga kort, och Scheduled anvÃĊnder hela kortleken\n\nUnder granskning:\n- VÃĊndbyten fram och bak\n- NÃĊsta hoppar Ã¶ver det aktuella kortet utan att gÃ¶ra poÃĊng\n- FramgÃċng markerar kortet som korrekt\n- Fail markerar kortet som misslyckat och tar tillbaka det tidigare\n\nOm du hÃċller Select pÃċ en kortlek i Statistics, kan du radera den kortlekens flashkortstatistik efter bekrÃĊftelse."
STR_README_SLEEP_BODY: "Anpassa viloskÃĊrmar sÃċ mycket du vill.\nDu kan ha olika kataloger, vÃĊlja vilken du vill anvÃĊnda, blÃĊddra lÃċngsamt igenom bilderna och till och med bestÃĊmma om ordningen ÃĊr slumpmÃĊssig eller sekventiell.\n\nDu kan skapa extra mappar sÃċ lÃĊnge de bÃ¶rjar med sleep_, till exempel: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "I InstÃĊllningar > Appar > GenvÃĊgar kan du organisera hem och appar.\n\nDu kan:\n- bestÃĊm om varje app tillhÃ¶r Home eller Apps\n- visa eller dÃ¶lj varje genvÃĊg\n- ÃĊndra ordningen pÃċ objekt pÃċ bÃċda skÃĊrmarna\n\nDetta ÃĊr det enklaste sÃĊttet att hÃċlla startprogrammet enkelt."
STR_README_SETTINGS_BODY: "Vissa instÃĊllningar fÃ¶rtjÃĊnar en snabb fÃ¶rklaring:\n\nLÃĊsare\n- TextkantutjÃĊmning jÃĊmnar ut text, men kan kosta lite hastighet\n- TextmÃ¶rkare ÃĊndrar hur mÃ¶rk text ser ut\n- LÃĊsarens uppdateringslÃĊge ÃĊndrar uppdateringsstilen; Auto ÃĊr den sÃĊkra standarden\n- Teckensnittsfamilj och storlek betyder vanligtvis mer ÃĊn grÃĊnssnittstema fÃ¶r komforten\n\nAppar\n- Visa dag visar eller dÃ¶ljer datumet i rubriken\n- Datumformat ÃĊndrar bara hur datumet visas\n- Dagliga mÃċl pÃċverkar rader, statistik och prestationer\n- Visa efter lÃĊsning Ã¶ppnar LÃĊsstatistik efter en rÃĊknad session\n- Aktivera prestationer slÃċr pÃċ eller av prestationssystemet\n- Prestationspopups styr bara upplÃċsningspopups\n\nDisplay\n- UI-tema ÃĊndrar bara grÃĊnssnittets utseende"
STR_README_ACHIEVEMENTS_BODY: "Kom ihÃċg att anvÃĊnda Sync Day varje dag sÃċ att de flesta prestationer kan spÃċras korrekt.\nAchievements ÃĊr ett enkelt gamification-system med lÃĊsningsmÃċl och milstolpar att lÃċsa upp."
STR_README_IF_FOUND_BODY: "En app som hjÃĊlper nÃċgon att lÃĊmna tillbaka enheten om den tappas bort.\n\nAtt skriva pÃċ den hÃĊr enheten ÃĊr smÃĊrtsamt, sÃċ om du lÃĊgger till en fil som heter if_found.txt pÃċ SD-kortet kommer dess innehÃċll att visas nÃĊr den hÃĊr appen Ã¶ppnas.\n\nDu kan skriva vad du vill dÃĊr: en mening, ett telefonnummer, ett e-postmeddelande..."
