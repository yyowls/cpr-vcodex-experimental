STR_README_GITHUB_HINT: "Mer information om GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Anpassa hem och appar"
STR_README_SYNC_DAY_BODY: "Xteink X4 ska inte behandlas som om den hade en pålitlig realtidsklocka som överlever sömnen på ett tillförlitligt sätt. Så den här gaffeln använder en praktisk modell:\n\n1. Sync Day ansluter via Wi-Fi och hämtar aktuellt datum/tid med NTP.\n2. Det datumet blir den giltiga referensen för statistik.\n3. Om enheten senare tappar en giltig aktuell klocka, faller den fasta programvaran tillbaka till det senast sparade giltiga datumet.\n4. När rubriken visar ett reservdatum istället för ett nytt synkroniserat datum är det markerat med !.\n\nPraktisk betydelse:\n- en synkning per dag innan läsning brukar räcka\n- efter det fortsätter statistiken att använda den senast giltiga sparade dagen\n- om den verkliga dagen ändras bör du synkronisera igen\n\nSom standard är tidszonen \"Spanien / Madrid\". Du kan välja din egen tidszon och datumformat i Inställningar > Appar."
STR_README_STATS_BODY: "Regler:\n- Du måste ansluta till Wi‑Fi 1 gång per dag.\n- Minst 3 minuters läsning krävs för att data ska räknas.\n\nFör att kunna registrera statistik måste dagen först identifieras.\n1. Konfigurera Wi‑Fi-anslutningen i förväg.\n2. Tryck 1 gång per dag (innan du läser) på knappen Sync Day.\nEfter Sync Day registreras all aktivitet på den dagen tills du trycker på Sync Day igen nästa dag.\n3. Njut av \"Reading Stats\", \"Reading Heatmap\".\n4. Valfritt. I \"Settings > Apps > Reading Stats\" kan du anpassa, återställa och ändra statistiken.\n\nValfritt: om du vill ha böcker utan statistik, skapa en mapp som heter /ignore_stats/ och lägg dina EPUB-filer där."
STR_README_PROFILE_BODY: "Läsprofil är en 7-dagars ögonblicksbild av dina läsvanor.\n\nDen får fyra axlar:\n- Vana: hur ofta du läser och nådde ditt dagliga mål\n- Stabilitet: hur jämnt din läsning fördelades över veckan\n- Engagemang: hur ofta kom du tillbaka för en annan session\n- Djup: om dina sessioner mestadels var korta, medelstora eller långa\n\nTotalpoängen är bara en sammanfattning. De fyra axlarna är det som verkligen förklarar ditt mönster."
STR_README_BOOKMARKS_BODY: "Medan en bok är öppen:\n- Om du håller ned den nedre OK-tangenten sparas den aktuella sidan som ett bokmärke.\n– Om du trycker på samma knapp snabbt öppnas en meny så att du snabbt kan kontrollera bokmärken.\n- För att radera ett bokmärke, håll nere samma knapp igen medan bokmärket är valt."
STR_README_FAVORITES_BODY: "Med Favoriter kan du fästa böcker som du vill ha snabb åtkomst till.\n\nHur det fungerar:\n- öppna Favoriter > Bläddra bland filer\n- gå igenom mappar som en vanlig filläsare\n- varje bok kan markeras eller avmarkeras med kryssrutan till höger\n\nHantera favoriter:\n- Favoriter > Beställ favoriter låter dig manuellt välja vilka böcker som ska visas först\n- håll Välj på en favorit där om du vill ta bort den, bekräfta sedan\n- det finns ingen fast gräns för hur många favoriter du kan behålla\n\nValfritt:\n- i Inställningar > Display > Karusell, välj Favoriter om du vill att Hem ska visa dina första favoritböcker istället för de senaste."
STR_README_FLASHCARDS_BODY: "Flashcards studerar CSV-kort som lagras på SD-kortet.\n\nHuvudsektioner:\n- Öppna laddar en kortlek från förvaringen\n- Recents återöppnar däck du nyligen använde\n- Statistik listar kända kortlekar och deras framsteg\n- Inställningar låter dig välja studieläge och sessionsstorlek\n\nStudielägen:\n- Due bygger en ändlig granskningssession från förfallna kort först och osynliga kort andra\n- Schemalagt bygger en ändlig blandad session från hela leken\n- Infinite ignorerar sessionsstorlek och fortsätter tills du lämnar manuellt\n\nHur alternativen fungerar:\n- Studieläge avgör vilka kort som kommer in i sessionen\n- Sessionsstorleken avgör hur många av dessa kort som används\n- Om sessionsstorleken är Alla, använder Due alla förfallna plus osynliga kort, och Scheduled använder hela kortleken\n\nUnder granskning:\n- Vändbyten fram och bak\n- Nästa hoppar över det aktuella kortet utan att göra poäng\n- Framgång markerar kortet som korrekt\n- Fail markerar kortet som misslyckat och tar tillbaka det tidigare\n\nOm du håller Select på en kortlek i Statistics, kan du radera den kortlekens flashkortstatistik efter bekräftelse."
STR_README_SLEEP_BODY: "Anpassa viloskärmar så mycket du vill.\nDu kan ha olika kataloger, välja vilken du vill använda, bläddra långsamt igenom bilderna och till och med bestämma om ordningen är slumpmässig eller sekventiell.\n\nDu kan skapa extra mappar så länge de börjar med sleep_, till exempel: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "I Inställningar > Appar > Genvägar kan du organisera hem och appar.\n\nDu kan:\n- bestäm om varje app tillhör Home eller Apps\n- visa eller dölj varje genväg\n- ändra ordningen på objekt på båda skärmarna\n\nDetta är det enklaste sättet att hålla startprogrammet enkelt."
STR_README_SETTINGS_BODY: "Vissa inställningar förtjänar en snabb förklaring:\n\nLäsare\n- Textkantutjämning jämnar ut text, men kan kosta lite hastighet\n- Textmörkare ändrar hur mörk text ser ut\n- Läsarens uppdateringsläge ändrar uppdateringsstilen; Auto är den säkra standarden\n- Teckensnittsfamilj och storlek betyder vanligtvis mer än gränssnittstema för komforten\n\nAppar\n- Visa dag visar eller döljer datumet i rubriken\n- Datumformat ändrar bara hur datumet visas\n- Dagliga mål påverkar rader, statistik och prestationer\n- Visa efter läsning öppnar Lässtatistik efter en räknad session\n- Aktivera prestationer slår på eller av prestationssystemet\n- Prestationspopups styr bara upplåsningspopups\n\nDisplay\n- UI-tema ändrar bara gränssnittets utseende"
STR_README_ACHIEVEMENTS_BODY: "Kom ihåg att använda Sync Day varje dag så att de flesta prestationer kan spåras korrekt.\nAchievements är ett enkelt gamification-system med läsningsmål och milstolpar att låsa upp."
STR_README_IF_FOUND_BODY: "En app som hjälper någon att lämna tillbaka enheten om den tappas bort.\n\nAtt skriva på den här enheten är smärtsamt, så om du lägger till en fil som heter if_found.txt på SD-kortet kommer dess innehåll att visas när den här appen öppnas.\n\nDu kan skriva vad du vill där: en mening, ett telefonnummer, ett e-postmeddelande..."
