STR_README_TOPIC_SHORTCUTS: "Anpassa hem och appar"
STR_README_SYNC_DAY_BODY: "Xteink X4 ska inte behandlas som om den hade en pålitlig realtidsklocka som överlever sömnen på ett tillförlitligt sätt. Så den här gaffeln använder en praktisk modell:\n\n1. Sync Day ansluter via Wi-Fi och hämtar aktuellt datum/tid med NTP.\n2. Det datumet blir den giltiga referensen för statistik.\n3. Om enheten senare tappar en giltig aktuell klocka, faller den fasta programvaran tillbaka till det senast sparade giltiga datumet.\n4. När rubriken visar ett reservdatum istället för ett nytt synkroniserat datum är det markerat med !.\n\nPraktisk betydelse:\n- en synkning per dag innan läsning brukar räcka\n- efter det fortsätter statistiken att använda den senast giltiga sparade dagen\n- om den verkliga dagen ändras bör du synkronisera igen\n\nSom standard är tidszonen \"Spanien / Madrid\". Du kan välja din egen tidszon och datumformat i Inställningar > Appar."
STR_README_STATS_BODY: "Regler:\n- Du måste ansluta till Wi‑Fi 1 gång per dag.\n- Minst 3 minuters läsning krävs för att data ska räknas.\n\nFör att kunna registrera statistik måste dagen först identifieras.\n1. Konfigurera Wi‑Fi-anslutningen i förväg.\n2. Tryck 1 gång per dag (innan du läser) på knappen Sync Day.\nEfter Sync Day registreras all aktivitet på den dagen tills du trycker på Sync Day igen nästa dag.\n3. Njut av \"Reading Stats\", \"Reading Heatmap\".\n4. Valfritt. I \"Settings > Apps > Reading Stats\" kan du anpassa, återställa och ändra statistiken.\n\nValfritt: om du vill ha böcker utan statistik, skapa en mapp som heter /ignore_stats/ och lägg dina EPUB-filer där."
STR_README_BOOKMARKS_BODY: "Medan en bok är öppen:\n- Om du håller ned den nedre OK-tangenten sparas den aktuella sidan som ett bokmärke.\n– Om du trycker på samma knapp snabbt öppnas en meny så att du snabbt kan kontrollera bokmärken.\n- För att radera ett bokmärke, håll nere samma knapp igen medan bokmärket är valt."
STR_README_SLEEP_BODY: "Anpassa viloskärmar så mycket du vill.\nDu kan ha olika kataloger, välja vilken du vill använda, bläddra långsamt igenom bilderna och till och med bestämma om ordningen är slumpmässig eller sekventiell.\n\nDu kan skapa extra mappar så länge de börjar med sleep_, till exempel: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "I Inställningar > Appar > Genvägar kan du:\n- välj vilka appar som ska visas i hemmet eller i appar\n- ändra ordningen för valfri app på båda skärmarna"
STR_README_ACHIEVEMENTS_BODY: "Kom ihåg att använda Sync Day varje dag så att de flesta prestationer kan spåras korrekt.\nAchievements är ett enkelt gamification-system med läsningsmål och milstolpar att låsa upp."
STR_README_IF_FOUND_BODY: "En app som hjälper någon att lämna tillbaka enheten om den tappas bort.\n\nAtt skriva på den här enheten är smärtsamt, så om du lägger till en fil som heter if_found.txt på SD-kortet kommer dess innehåll att visas när den här appen öppnas.\n\nDu kan skriva vad du vill där: en mening, ett telefonnummer, ett e-postmeddelande..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
