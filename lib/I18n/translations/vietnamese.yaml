STR_README_SYNC_DAY_BODY: "Không nên coi Xteink X4 như một thiết bị có đồng hồ thời gian thực đáng tin cậy vẫn chính xác sau khi sleep. Vì vậy, bản fork này dùng một mô hình thực tế:\n\n1. Sync Day kết nối qua Wi-Fi và lấy ngày giờ hiện tại bằng NTP.\n2. Ngày đó trở thành mốc hợp lệ cho thống kê.\n3. Nếu sau đó thiết bị không còn đồng hồ hiện tại hợp lệ, firmware sẽ quay về ngày hợp lệ gần nhất đã lưu.\n4. Khi header đang hiển thị ngày dự phòng thay vì ngày mới vừa đồng bộ, nó sẽ được đánh dấu bằng !.\n\nÝ nghĩa thực tế:\n- thường chỉ cần đồng bộ một lần mỗi ngày trước khi đọc\n- sau đó thống kê tiếp tục dùng ngày hợp lệ đã lưu gần nhất\n- nếu ngày thực thay đổi, bạn nên đồng bộ lại\n\nMặc định múi giờ là \"Spain / Madrid\". Bạn có thể chọn múi giờ và định dạng ngày riêng trong Settings > Apps."
STR_README_STATS_BODY: "Quy tắc:\n- Bạn cần kết nối Wi-Fi một lần mỗi ngày.\n- Cần ít nhất 3 phút đọc thì dữ liệu mới được tính.\n\nĐể ghi thống kê, firmware trước hết phải biết hôm nay là ngày nào.\n1. Hãy thiết lập Wi-Fi trước.\n2. Nhấn Sync Day một lần mỗi ngày trước khi đọc.\nSau Sync Day, mọi hoạt động đọc sẽ được ghi vào ngày đó cho đến khi bạn nhấn Sync Day lại vào ngày hôm sau.\n3. Dùng \"Reading Stats\", \"Reading Heatmap\" và \"Reading Day\".\n4. Tùy chọn. Trong \"Settings > Apps > Reading Stats\" bạn có thể tùy chỉnh, đặt lại và quản lý thống kê.\n\nTùy chọn: nếu bạn muốn có sách không bị tính thống kê, hãy tạo thư mục /ignore_stats/ và đặt các EPUB đó vào trong."
STR_README_PROFILE_BODY: "Hồ sơ đọc là bản tóm tắt nhanh 7 ngày về thói quen đọc sách của bạn.\n\nNó ghi được bốn trục:\n- Thói quen: tần suất bạn đọc và đạt được mục tiêu hàng ngày\n- Tính ổn định: mức độ đọc của bạn được trải đều trong tuần\n- Mức độ tương tác: tần suất bạn quay lại cho một phiên khác\n- Độ sâu: phiên của bạn chủ yếu là ngắn, trung bình hay dài\n\nTổng số điểm chỉ là một bản tóm tắt. Bốn trục là những gì thực sự giải thích mô hình của bạn."
STR_README_BOOKMARKS_BODY: "Khi đang mở sách:\n- Nếu bạn giữ nút OK phía dưới, trang hiện tại sẽ được lưu làm dấu trang.\n- Nếu bạn nhấn nhanh cùng nút đó, một menu sẽ mở ra để bạn kiểm tra dấu trang nhanh chóng.\n- Để xóa dấu trang, hãy giữ lại nút đó khi dấu trang đang được chọn."
STR_README_FAVORITES_BODY: "Mục yêu thích cho phép bạn ghim những cuốn sách mà bạn muốn truy cập nhanh.\n\nCách thức hoạt động:\n- mở Mục ưa thích > Duyệt tệp\n- di chuyển qua các thư mục như trình duyệt tệp thông thường\n- mỗi cuốn sách có thể được đánh dấu hoặc bỏ đánh dấu bằng hộp kiểm bên phải\n\nQuản lý mục yêu thích:\n- Mục yêu thích > Sắp xếp mục yêu thích cho phép bạn chọn thủ công cuốn sách nào xuất hiện đầu tiên\n- giữ Chọn mục ưa thích ở đó nếu bạn muốn xóa nó, sau đó xác nhận\n- không có giới hạn cố định về số lượng mục yêu thích bạn có thể giữ lại\n\nTùy chọn:\n- trong Cài đặt > Hiển thị > Băng chuyền, chọn Mục ưa thích nếu bạn muốn Trang chủ hiển thị những cuốn sách yêu thích đầu tiên của bạn thay vì những cuốn sách gần đây."
STR_README_FLASHCARDS_BODY: "Flashcards nghiên cứu các bộ dữ liệu CSV được lưu trữ trên thẻ SD.\n\nCác phần chính:\n- Mở tải một bộ bài từ kho\n- Gần đây mở lại các bộ bài bạn đã sử dụng gần đây\n- Thống kê danh sách các bộ bài đã biết và tiến trình của chúng\n- Cài đặt cho phép bạn chọn chế độ học và kích thước buổi học\n\nChế độ học tập:\n- Due xây dựng một phiên đánh giá hữu hạn từ các thẻ đến hạn đầu tiên và các thẻ chưa nhìn thấy thứ hai\n- Xây dựng một phiên xáo trộn hữu hạn từ toàn bộ bộ bài\n- Infinite bỏ qua kích thước Phiên và tiếp tục cho đến khi bạn thoát theo cách thủ công\n\nCách các tùy chọn hoạt động:\n- Chế độ học quyết định thẻ nào vào phiên\n- Kích thước phiên quyết định số lượng thẻ được sử dụng\n- Nếu Kích thước phiên là Tất cả, Đến hạn sử dụng tất cả các thẻ đến hạn cộng với các thẻ chưa nhìn thấy và Theo lịch sử dụng toàn bộ bộ bài\n\nTrong khi xem xét:\n- Hoán đổi lật trước và sau\n- Tiếp theo bỏ qua thẻ hiện tại mà không ghi điểm\n- Thành công đánh dấu thẻ là đúng\n- Thất bại đánh dấu thẻ là thất bại và mang nó trở lại sớm hơn\n\nNếu bạn giữ nút Chọn trên một bộ bài bên trong Thống kê, bạn có thể xóa chỉ số thẻ nhớ của bộ bài đó sau khi xác nhận."
STR_README_SLEEP_BODY: "Bạn có thể tùy chỉnh màn hình ngủ theo ý muốn.\nBạn có thể có nhiều thư mục khác nhau, chọn thư mục muốn dùng, duyệt ảnh chậm rãi, và thậm chí quyết định thứ tự là ngẫu nhiên hay tuần tự.\n\nBạn có thể tạo thêm các thư mục miễn là chúng bắt đầu bằng sleep_, ví dụ: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Trong Cài đặt > Ứng dụng > Phím tắt, bạn có thể sắp xếp Màn hình chính và Ứng dụng.\n\nBạn có thể:\n- quyết định xem mỗi ứng dụng thuộc về Trang chủ hay Ứng dụng\n- hiển thị hoặc ẩn từng phím tắt\n- thay đổi thứ tự các mục trên cả hai màn hình\n\nĐây là cách dễ nhất để giữ cho trình khởi chạy đơn giản."
STR_README_SETTINGS_BODY: "Một số cài đặt cần được giải thích nhanh:\n\nTrình đọc\n- Khử răng cưa văn bản giúp văn bản mượt mà hơn nhưng có thể tốn một chút tốc độ\n- Độ tối của văn bản thay đổi giao diện của văn bản tối\n- Chế độ làm mới đầu đọc thay đổi kiểu làm mới; Tự động là mặc định an toàn\n- Họ phông chữ và kích thước thường quan trọng hơn chủ đề giao diện người dùng để tạo sự thoải mái\n\nỨng dụng\n- Ngày hiển thị hiển thị hoặc ẩn ngày ở tiêu đề\n- Định dạng ngày chỉ thay đổi cách hiển thị ngày\n- Mục tiêu hàng ngày ảnh hưởng đến chuỗi, chỉ số và thành tích\n- Hiển thị sau khi đọc mở Thống kê đọc sau một phiên được tính\n- Bật thành tích, bật hoặc tắt hệ thống thành tích\n- Cửa sổ bật lên thành tích chỉ kiểm soát cửa sổ bật lên mở khóa\n\nHiển thị\n- UI Theme chỉ thay đổi giao diện"
STR_README_ACHIEVEMENTS_BODY: "Hãy nhớ dùng Sync Day mỗi ngày để đa số thành tựu có thể được theo dõi chính xác.\nAchievements là một hệ thống gamification đơn giản với các mục tiêu và cột mốc đọc để mở khóa."
STR_README_IF_FOUND_BODY: "Một ứng dụng giúp người khác trả lại thiết bị nếu nó bị thất lạc.\n\nViệc nhập chữ trên thiết bị này khá vất vả, nên nếu bạn thêm tệp if_found.txt vào thẻ SD, nội dung của nó sẽ được hiển thị khi mở ứng dụng này.\n\nBạn có thể viết bất cứ điều gì bạn muốn ở đó: một câu nhắn, số điện thoại, email..."
