STR_README: "Hướng dẫn"
STR_README_APP_DESC: "Hướng dẫn nhanh về các tính năng chính của vCodex"
STR_README_GITHUB_HINT: "Chi tiết hơn trên GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Tùy chỉnh Trang chủ và Ứng dụng"
STR_README_SYNC_DAY_BODY: "Không nên coi Xteink X4 như một thiết bị có đồng hồ thời gian thực đáng tin cậy vẫn chính xác sau khi sleep. Vì vậy, bản fork này dùng một mô hình thực tế:\\n\\n1. Sync Day kết nối qua Wi-Fi và lấy ngày giờ hiện tại bằng NTP.\\n2. Ngày đó trở thành mốc hợp lệ cho thống kê.\\n3. Nếu sau đó thiết bị không còn đồng hồ hiện tại hợp lệ, firmware sẽ quay về ngày hợp lệ gần nhất đã lưu.\\n4. Khi header đang hiển thị ngày dự phòng thay vì ngày mới vừa đồng bộ, nó sẽ được đánh dấu bằng !.\\n\\nÝ nghĩa thực tế:\\n- thường chỉ cần đồng bộ một lần mỗi ngày trước khi đọc\\n- sau đó thống kê tiếp tục dùng ngày hợp lệ đã lưu gần nhất\\n- nếu ngày thực thay đổi, bạn nên đồng bộ lại\\n\\nMặc định múi giờ là \\\"Spain / Madrid\\\". Bạn có thể chọn múi giờ và định dạng ngày riêng trong Settings > Apps."
STR_README_STATS_BODY: "Quy tắc:\\n- Bạn cần kết nối Wi-Fi một lần mỗi ngày.\\n- Cần ít nhất 3 phút đọc thì dữ liệu mới được tính.\\n\\nĐể ghi thống kê, firmware trước hết phải biết hôm nay là ngày nào.\\n1. Hãy thiết lập Wi-Fi trước.\\n2. Nhấn Sync Day một lần mỗi ngày trước khi đọc.\\nSau Sync Day, mọi hoạt động đọc sẽ được ghi vào ngày đó cho đến khi bạn nhấn Sync Day lại vào ngày hôm sau.\\n3. Dùng \\\"Reading Stats\\\", \\\"Reading Heatmap\\\" và \\\"Reading Day\\\".\\n4. Tùy chọn. Trong \\\"Settings > Apps > Reading Stats\\\" bạn có thể tùy chỉnh, đặt lại và quản lý thống kê.\\n\\nTùy chọn: nếu bạn muốn có sách không bị tính thống kê, hãy tạo thư mục /ignore_stats/ và đặt các EPUB đó vào trong."
STR_README_BOOKMARKS_BODY: "Khi đang mở sách:\\n- Nếu bạn giữ nút OK phía dưới, trang hiện tại sẽ được lưu làm dấu trang.\\n- Nếu bạn nhấn nhanh cùng nút đó, một menu sẽ mở ra để bạn kiểm tra dấu trang nhanh chóng.\\n- Để xóa dấu trang, hãy giữ lại nút đó khi dấu trang đang được chọn."
STR_README_SLEEP_BODY: "Bạn có thể tùy chỉnh màn hình ngủ theo ý muốn.\\nBạn có thể có nhiều thư mục khác nhau, chọn thư mục muốn dùng, duyệt ảnh chậm rãi, và thậm chí quyết định thứ tự là ngẫu nhiên hay tuần tự.\\n\\nBạn có thể tạo thêm các thư mục miễn là chúng bắt đầu bằng sleep_, ví dụ: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Trong Settings > Apps > Shortcuts bạn có thể:\\n- chọn xem mỗi app thuộc Trang chủ hay Ứng dụng\\n- chọn xem mỗi lối tắt được hiển thị hay ẩn đi\\n- thay đổi thứ tự app trên cả hai màn hình"
STR_README_ACHIEVEMENTS_BODY: "Hãy nhớ dùng Sync Day mỗi ngày để đa số thành tựu có thể được theo dõi chính xác.\\nAchievements là một hệ thống gamification đơn giản với các mục tiêu và cột mốc đọc để mở khóa."
STR_README_IF_FOUND_BODY: "Một ứng dụng giúp người khác trả lại thiết bị nếu nó bị thất lạc.\\n\\nViệc nhập chữ trên thiết bị này khá vất vả, nên nếu bạn thêm tệp if_found.txt vào thẻ SD, nội dung của nó sẽ được hiển thị khi mở ứng dụng này.\\n\\nBạn có thể viết bất cứ điều gì bạn muốn ở đó: một câu nhắn, số điện thoại, email..."
