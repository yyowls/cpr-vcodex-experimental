STR_README: "ReadMe"
STR_README_APP_DESC: "Krótki przewodnik po kluczowych funkcjach vCodex"
STR_README_GITHUB_HINT: "Więcej szczegółów na GitHubie @franssjz"
STR_README_TOPIC_SHORTCUTS: "Dostosuj stronę główną i aplikacje"
STR_README_SYNC_DAY_BODY: "Xteink X4 nie powinien być traktowany tak, jakby miał niezawodny zegar czasu rzeczywistego, który w godny zaufania sposób przetrwa sen. Zatem w tym widelcu zastosowano praktyczny model:\n\n1. Sync Day łączy się przez Wi-Fi i pobiera aktualną datę/godzinę za pomocą protokołu NTP.\n2. Data ta staje się ważnym punktem odniesienia dla statystyk.\n3. Jeśli później urządzenie utraci ważny bieżący zegar, oprogramowanie sprzętowe powróci do ostatniej zapisanej ważnej daty.\n4. Jeśli w nagłówku zamiast daty nowej synchronizacji znajduje się data zastępcza, jest ona oznaczona !.\n\nZnaczenie praktyczne:\n- zwykle wystarcza jedna synchronizacja dziennie przed czytaniem\n- następnie statystyki będą kontynuowane z wykorzystaniem ostatniego ważnego zapisanego dnia\n- jeśli rzeczywisty dzień ulegnie zmianie, należy przeprowadzić ponowną synchronizację\n\nDomyślna strefa czasowa to „Hiszpania / Madryt”. Możesz wybrać własną strefę czasową i format daty w Ustawieniach > Aplikacje."
STR_README_STATS_BODY: "Zasady:\n- Musisz połączyć się z Wi‑Fi 1 raz dziennie.\n- Aby dane zostały zaliczone, potrzebne są co najmniej 3 minuty czytania.\n\nAby zapisywać statystyki, trzeba najpierw ustalić dzień.\n1. Wcześniej skonfiguruj połączenie Wi‑Fi.\n2. Naciśnij przycisk Sync Day 1 raz dziennie (przed czytaniem).\nPo Sync Day cała aktywność będzie zapisywana do tego dnia, dopóki następnego dnia ponownie nie naciśniesz Sync Day.\n3. Korzystaj z \"Reading Stats\", \"Reading Heatmap\".\n4. Opcjonalnie. W \"Settings > Apps > Reading Stats\" możesz personalizować, resetować i modyfikować statystyki.\n\nOpcjonalnie: jeśli chcesz mieć książki bez statystyk, utwórz katalog o nazwie /ignore_stats/ i umieść tam swoje pliki EPUB."
STR_README_PROFILE_BODY: "Profil czytelniczy to 7-dniowy przegląd Twoich nawyków czytelniczych.\n\nPunktuje cztery osie:\n- Nawyk: jak często czytasz i osiągasz swój dzienny cel\n- Stabilność: jak równomiernie rozłożyło się czytanie w ciągu tygodnia\n- Zaangażowanie: jak często wracałeś na kolejną sesję\n- Głębokość: czy Twoje sesje były przeważnie krótkie, średnie czy długie\n\nCałkowity wynik jest jedynie podsumowaniem. Cztery osie naprawdę wyjaśniają twój wzór."
STR_README_BOOKMARKS_BODY: "Gdy książka jest otwarta:\n- Jeśli przytrzymasz dolny klawisz OK, bieżąca strona zostanie zapisana jako zakładka.\n- Jeśli szybko naciśniesz ten sam klawisz, otworzy się menu, w którym możesz szybko sprawdzić zakładki.\n- Aby usunąć zakładkę, przytrzymaj ten sam przycisk ponownie, gdy zakładka jest zaznaczona."
STR_README_FAVORITES_BODY: "Ulubione umożliwiają przypinanie książek, do których chcesz mieć szybki dostęp.\n\nJak to działa:\n- otwórz Ulubione > Przeglądaj pliki\n- poruszaj się po folderach jak w zwykłej przeglądarce plików\n- każdą książkę można zaznaczyć lub odznaczyć checkboxem po prawej stronie\n\nZarządzanie ulubionymi:\n- Ulubione > Zamów ulubione pozwala ręcznie wybrać, które książki pojawią się jako pierwsze\n- przytrzymaj Wybierz tam ulubione, jeśli chcesz je usunąć, a następnie potwierdź\n- nie ma ustalonego limitu liczby ulubionych, które możesz zachować\n\nOpcjonalnie:\n- w Ustawieniach > Wyświetlacz > Karuzela wybierz Ulubione, jeśli chcesz, aby Strona główna wyświetlała pierwsze ulubione książki, a nie najnowsze."
STR_README_FLASHCARDS_BODY: "Flashcards bada talie CSV zapisane na karcie SD.\n\nGłówne sekcje:\n- Otwórz ładuje talię z magazynu\n- Ostatnie ponownie otwiera talie, których ostatnio używałeś\n- Statystyki przedstawiają znane talie i ich postępy\n- Ustawienia pozwalają wybrać tryb nauki i rozmiar sesji\n\nTryby nauki:\n- Due tworzy skończoną sesję przeglądu z kart należnych jako pierwszych i kart niewidocznych jako drugiej\n- Zaplanowane buduje skończoną, tasowaną sesję z całej talii\n- Infinite ignoruje rozmiar sesji i kontynuuje działanie, dopóki nie opuścisz ręcznie\n\nJak działają opcje:\n- Tryb nauki decyduje, które karty wchodzą do sesji\n- Rozmiar sesji decyduje o tym, ile z tych kart zostanie użytych\n- Jeśli rozmiar sesji to Wszystkie, Due wykorzystuje wszystkie zaległe i niewidoczne karty, a Zaplanowane wykorzystuje całą talię\n\nPodczas przeglądania:\n- Odwróć zamianę przodu i tyłu\n- Następnie pomija bieżącą kartę bez jej punktowania\n- Sukces oznacza, że karta jest poprawna\n- Fail oznacza kartę jako nieudaną i przywraca ją wcześniej\n\nJeśli przytrzymasz przycisk Wybierz na talii w obszarze Statystyki, możesz po potwierdzeniu usunąć statystyki fiszek z tej talii."
STR_README_SLEEP_BODY: "Dostosuj ekrany uśpienia tak, jak chcesz.\nMożesz mieć różne katalogi, wybierać, którego chcesz użyć, powoli przeglądać zdjęcia, a nawet decydować, czy kolejność jest losowa, czy sekwencyjna.\n\nMożesz utworzyć dodatkowe foldery, o ile zaczynają się od „snu_”, na przykład: „sleep_books”, „sleep_geek”, „sleep_disney”, „sleep_manga”…"
STR_README_SHORTCUTS_BODY: "W Ustawieniach > Aplikacje > Skróty możesz uporządkować stronę główną i aplikacje.\n\nMożesz:\n- zdecyduj, czy każda aplikacja należy do Strony głównej, czy do aplikacji\n- pokaż lub ukryj każdy skrót\n- zmień kolejność elementów na obu ekranach\n\nTo najłatwiejszy sposób na uproszczenie programu uruchamiającego."
STR_README_SETTINGS_BODY: "Niektóre ustawienia zasługują na szybkie wyjaśnienie:\n\nCzytnik\n- Wygładzanie tekstu wygładza tekst, ale może wymagać trochę szybkości\n- Ciemność tekstu zmienia wygląd ciemnego tekstu\n- Tryb odświeżania czytnika zmienia styl odświeżania; Automatycznie jest bezpiecznym ustawieniem domyślnym\n- Rodzina czcionek i rozmiar zwykle mają większe znaczenie dla wygody niż motyw interfejsu użytkownika\n\nAplikacje\n- Display Day pokazuje lub ukrywa datę w nagłówku\n- Format daty zmienia tylko sposób wyświetlania daty\n- Dzienny cel wpływa na passy, statystyki i osiągnięcia\n- Pokaż po przeczytaniu otwiera Statystyki czytania po zliczonej sesji\n- Włącz osiągnięcia włącza lub wyłącza system osiągnięć\n- Wyskakujące okienka osiągnięć kontrolują tylko wyskakujące okienka odblokowania\n\nWyświetlacz\n- Motyw interfejsu użytkownika zmienia jedynie wygląd interfejsu"
STR_README_ACHIEVEMENTS_BODY: "Pamiętaj, aby codziennie korzystać z Dnia synchronizacji, aby większość osiągnięć mogła być prawidłowo śledzona.\nOsiągnięcia to prosty system grywalizacji z odczytywaniem celów i kamieni milowych do odblokowania."
STR_README_IF_FOUND_BODY: "Aplikacja, która pomaga zwrócić zgubione urządzenie.\n\nPisanie na tym urządzeniu jest bolesne, więc jeśli dodasz plik o nazwie if_found.txt na kartę SD, jego zawartość zostanie wyświetlona po otwarciu tej aplikacji.\n\nMożesz tam napisać co chcesz: zdanie, numer telefonu, e-mail..."
