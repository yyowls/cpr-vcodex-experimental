STR_README: "ReadMe"
STR_README_APP_DESC: "Ghid rapid pentru caracteristicile cheie vCodex"
STR_README_GITHUB_HINT: "Mai multe detalii pe GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalizați Acasă și aplicații"
STR_README_SYNC_DAY_BODY: "Xteink X4 nu ar trebui tratat ca și cum ar avea un ceas de încredere în timp real, care supraviețuiește somnului într-un mod de încredere. Deci, această furcă folosește un model practic:\n\n1. Sync Day se conectează prin Wi-Fi și preia data/ora curentă folosind NTP.\n2. Acea dată devine referința valabilă pentru statistici.\n3. Dacă ulterior dispozitivul pierde un ceas curent valabil, firmware-ul revine la ultima dată valabilă salvată.\n4. Când antetul afișează o dată alternativă în loc de o nouă dată sincronizată, este marcat cu !.\n\nSens practic:\n- o sincronizare pe zi înainte de citire este de obicei suficientă\n- după aceea, statisticile continuă să utilizeze ultima zi salvată valabilă\n- dacă ziua reală se schimbă, ar trebui să vă sincronizați din nou\n\nÎn mod implicit, fusul orar este „Spania / Madrid”. Puteți selecta propriul fus orar și formatul de dată în Setări > Aplicații."
STR_README_STATS_BODY: "Reguli:\n- Trebuie să te conectezi la Wi‑Fi 1 dată pe zi.\n- Sunt necesare cel puțin 3 minute de citit pentru ca datele să fie luate în calcul.\n\nPentru a înregistra statistici este necesar să fie identificată ziua.\n1. Configurează în prealabil conexiunea Wi‑Fi.\n2. Apasă 1 dată pe zi (înainte de a citi) butonul Sync Day.\nDupă Sync Day, toată activitatea va fi înregistrată în acea zi până când vei apăsa din nou Sync Day în ziua următoare.\n3. Bucură-te de \"Reading Stats\", \"Reading Heatmap\".\n4. Opțional. În \"Settings > Apps > Reading Stats\" poți personaliza, reseta și modifica statisticile.\n\nOpțional: dacă vrei cărți fără statistici, creează un director numit /ignore_stats/ și pune acolo EPUB-urile tale."
STR_README_BOOKMARKS_BODY: "În timp ce o carte este deschisă:\n- Dacă țineți apăsată tasta OK de jos, pagina curentă este salvată ca marcaj.\n- Dacă atingeți rapid aceeași tastă, se deschide un meniu, astfel încât să puteți verifica rapid marcajele.\n- Pentru a șterge un marcaj, țineți apăsat din nou același buton în timp ce marcajul este selectat."
STR_README_SLEEP_BODY: "Personalizați ecranele de somn atât cât doriți.\nPuteți avea directoare diferite, puteți alege pe care să le utilizați, puteți răsfoi lent imaginile și chiar să decideți dacă ordinea este aleatorie sau secvențială.\n\nPuteți crea dosare suplimentare atâta timp cât încep cu sleep_, de exemplu: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "În Setări > Aplicații > Comenzi rapide puteți:\n- alegeți ce aplicații sunt afișate în Acasă sau în Aplicații\n- schimbați ordinea oricărei aplicații pe ambele ecrane"
STR_README_ACHIEVEMENTS_BODY: "Nu uitați să utilizați Ziua Sincronizării în fiecare zi, astfel încât majoritatea realizărilor să poată fi urmărite corect.\nAchievements este un sistem simplu de gamification cu obiective de citire și repere de deblocat."
STR_README_IF_FOUND_BODY: "O aplicație care ajută pe cineva să returneze dispozitivul dacă acesta se pierde.\n\nTastarea pe acest dispozitiv este dureroasă, așa că dacă adăugați un fișier numit if_found.txt pe cardul SD, conținutul acestuia va fi afișat atunci când această aplicație este deschisă.\n\nPuteți scrie acolo orice doriți: o propoziție, un număr de telefon, un e-mail..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
STR_README_REPORTS_SUGGESTIONS_BODY: "https://github.com/franssjz/cpr-vcodex\n\nu/franssjz7 (reddit)"
