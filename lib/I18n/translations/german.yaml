STR_README_TOPIC_SHORTCUTS: "Passen Sie Startseite und Apps an"
STR_README_SYNC_DAY_BODY: "Man sollte den Xteink X4 nicht so behandeln, als hätte er eine zuverlässige Echtzeituhr, die den Schlaf vertrauenswürdig übersteht. Diese Gabel verwendet also ein praktisches Modell:\n\n1. Sync Day stellt eine Verbindung über WLAN her und ruft das aktuelle Datum/die aktuelle Uhrzeit über NTP ab.\n2. Dieses Datum wird zur gültigen Referenz für Statistiken.\n3. Wenn das Gerät später keine gültige aktuelle Uhr mehr hat, greift die Firmware auf das zuletzt gespeicherte gültige Datum zurück.\n4. Wenn in der Kopfzeile ein Ersatzdatum anstelle eines neu synchronisierten Datums angezeigt wird, ist es mit ! gekennzeichnet.\n\nPraktische Bedeutung:\n- Eine Synchronisierung pro Tag vor dem Lesen reicht normalerweise aus\n- Danach verwenden die Statistiken weiterhin den letzten gültigen gespeicherten Tag\n- Wenn sich der tatsächliche Tag ändert, sollten Sie die Synchronisierung erneut durchführen\n\nStandardmäßig ist die Zeitzone „Spanien / Madrid“. Sie können unter Einstellungen > Apps Ihre eigene Zeitzone und Ihr eigenes Datumsformat auswählen."
STR_README_STATS_BODY: "Regeln:\n- Du musst dich 1 Mal pro Tag mit WLAN verbinden.\n- Mindestens 3 Minuten Lesezeit sind nötig, damit Daten gezählt werden.\n\nDamit Statistiken erfasst werden können, muss zuerst der Tag identifiziert werden.\n1. Richte die WLAN-Verbindung vorher ein.\n2. Drücke 1 Mal pro Tag (vor dem Lesen) die Taste Sync Day.\nNach Sync Day wird alle Aktivität diesem Tag zugeordnet, bis du am nächsten Tag erneut Sync Day drückst.\n3. Nutze \"Reading Stats\", \"Reading Heatmap\".\n4. Optional. Unter \"Settings > Apps > Reading Stats\" kannst du Statistiken anpassen, zurücksetzen und verwalten.\n\nOptional: Wenn du Bücher ohne Statistik möchtest, erstelle ein Verzeichnis namens /ignore_stats/ und lege dort deine EPUBs ab."
STR_README_BOOKMARKS_BODY: "Während ein Buch geöffnet ist:\n- Wenn Sie die untere OK-Taste gedrückt halten, wird die aktuelle Seite als Lesezeichen gespeichert.\n- Wenn Sie schnell auf dieselbe Taste tippen, öffnet sich ein Menü, damit Sie Lesezeichen schnell überprüfen können.\n- Um ein Lesezeichen zu löschen, halten Sie dieselbe Taste erneut gedrückt, während das Lesezeichen ausgewählt ist."
STR_README_SLEEP_BODY: "Passen Sie die Schlafbildschirme so an, wie Sie möchten.\nSie können verschiedene Verzeichnisse einrichten, auswählen, welches Sie verwenden möchten, langsam durch die Bilder blättern und sogar entscheiden, ob die Reihenfolge zufällig oder sequentiell sein soll.\n\nSie können zusätzliche Ordner erstellen, sofern diese mit „sleep_“ beginnen, zum Beispiel: „sleep_books“, „sleep_geek“, „sleep_disney“, „sleep_manga“ ..."
STR_README_SHORTCUTS_BODY: "Unter Einstellungen > Apps > Verknüpfungen können Sie:\n- Wählen Sie aus, welche Apps auf der Startseite oder in Apps angezeigt werden\n- Ändern Sie die Reihenfolge einer App auf beiden Bildschirmen"
STR_README_ACHIEVEMENTS_BODY: "Denken Sie daran, den Sync Day jeden Tag zu nutzen, damit die meisten Erfolge korrekt nachverfolgt werden können.\nAchievements ist ein einfaches Gamification-System mit freizuschaltenden Lesezielen und Meilensteinen."
STR_README_IF_FOUND_BODY: "Eine App, die jemandem hilft, das Gerät zurückzugeben, wenn es verloren geht.\n\nDas Tippen auf diesem Gerät ist mühsam. Wenn Sie also eine Datei namens if_found.txt zur SD-Karte hinzufügen, wird deren Inhalt angezeigt, wenn diese App geöffnet wird.\n\nSie können dort alles schreiben, was Sie wollen: einen Satz, eine Telefonnummer, eine E-Mail ..."
