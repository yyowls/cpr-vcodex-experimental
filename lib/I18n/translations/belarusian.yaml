STR_README: "ReadMe"
STR_README_APP_DESC: "Кароткае кіраўніцтва па асноўных функцыях vCodex"
STR_README_GITHUB_HINT: "Больш падрабязна на GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Наладзьце галоўную старонку і праграмы"
STR_README_SYNC_DAY_BODY: "Не варта разглядаць Xteink X4 як надзейны гадзіннік рэальнага часу, які надзейна вытрымлівае сон. Такім чынам, гэтая відэлец выкарыстоўвае практычную мадэль:\n\n1. Sync Day падключаецца праз Wi-Fi і атрымлівае бягучую дату/час з дапамогай NTP.\n2. Гэтая дата становіцца сапраўдным арыенцірам для статыстыкі.\n3. Калі прылада пазней страціць сапраўдны бягучы гадзіннік, прашыўка вернецца да апошняй захаванай сапраўднай даты.\n4. Калі ў загалоўку паказваецца рэзервовая дата замест новай сінхранізаванай даты, яна пазначаецца !.\n\nПрактычны сэнс:\n- звычайна дастаткова адной сінхранізацыі ў дзень перад чытаннем\n- пасля гэтага статыстыка працягвае выкарыстоўваць апошні сапраўдны захаваны дзень\n- калі рэальны дзень зменіцца, вы павінны сінхранізаваць зноў\n\nПа змаўчанні гадзінны пояс \"Іспанія / Мадрыд\". Вы можаце выбраць свой уласны гадзінны пояс і фармат даты ў Наладах > Праграмы."
STR_README_STATS_BODY: "Правілы:\n- Трэба падключацца да Wi-Fi 1 раз у дзень.\n- Каб дадзеныя залічваліся, патрабуецца мінімум 3 хвіліны чытання.\n\nКаб запісваць статыстыку, спачатку трэба вызначыць дзень.\n1. Загадзя наладзьце падключэнне да Wi-Fi.\n2. Націскайце кнопку Sync Day 1 раз у дзень (перад чытаннем).\nПасля Sync Day уся актыўнасць будзе запісвацца на гэты дзень, пакуль на наступны дзень вы зноў не націснеце Sync Day.\n3. Карыстайцеся \"Reading Stats\", \"Reading Heatmap\".\n4. Дадаткова. У \"Settings > Apps > Reading Stats\" можна наладжваць, скідваць і змяняць статыстыку.\n\nДадаткова: калі вы хочаце мець кнігі без статыстыкі, стварыце каталог з назвай /ignore_stats/ і змясціце туды свае EPUB."
STR_README_BOOKMARKS_BODY: "Пакуль кніга адкрыта:\n- Калі вы ўтрымліваеце ніжнюю клавішу OK, бягучая старонка захоўваецца як закладка.\n- Калі вы хутка націснеце тую ж клавішу, адкрыецца меню, каб вы маглі хутка праверыць закладкі.\n- Каб выдаліць закладку, утрымлівайце тую ж кнопку яшчэ раз, пакуль закладка выбрана."
STR_README_SLEEP_BODY: "Наладзьце экраны сну, колькі заўгодна.\nВы можаце мець розныя каталогі, выбіраць, які з іх выкарыстоўваць, павольна праглядаць выявы і нават вырашаць, выпадковы або паслядоўны парадак.\n\nВы можаце ствараць дадатковыя папкі, калі яны пачынаюцца з sleep_, напрыклад: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "У Наладах > Праграмы > Ярлыкі вы можаце:\n- выбраць, якія прыкладанні будуць паказвацца на Галоўнай старонцы або ў Праграмах\n- змяніць парадак любога прыкладання на абодвух экранах"
STR_README_ACHIEVEMENTS_BODY: "Не забывайце выкарыстоўваць Дзень сінхранізацыі кожны дзень, каб большасць дасягненняў можна было правільна адсочваць.\nДасягненні - гэта простая сістэма гейміфікацыі з мэтамі чытання і этапамі для разблакіроўкі."
STR_README_IF_FOUND_BODY: "Прыкладанне, якое дапамагае вярнуць прыладу, калі яна згубілася.\n\nНабіраць тэкст на гэтай прыладзе балюча, таму, калі вы дадасце файл if_found.txt на SD-карту, яго змесціва будзе паказана пры адкрыцці гэтай праграмы.\n\nТам можна напісаць што заўгодна: фразу, нумар тэлефона, электронную пошту..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
STR_README_REPORTS_SUGGESTIONS_BODY: "https://github.com/franssjz/cpr-vcodex\n\nu/franssjz7 (reddit)"