STR_README: "ReadMe"
STR_README_APP_DESC: "Korte handleiding voor de belangrijkste vCodex-functies"
STR_README_GITHUB_HINT: "Meer details op GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Pas het startscherm en apps aan"
STR_README_SYNC_DAY_BODY: "De Xteink X4 moet niet worden behandeld alsof hij een betrouwbare realtime klok heeft die de slaap op een betrouwbare manier overleeft. Deze vork maakt dus gebruik van een praktisch model:\n\n1. Sync Day maakt verbinding via Wi-Fi en haalt de huidige datum/tijd op met behulp van NTP.\n2. Die datum wordt de geldige referentie voor statistieken.\n3. Als het apparaat later een geldige huidige klok verliest, valt de firmware terug naar de laatst opgeslagen geldige datum.\n4. Wanneer de header een terugvaldatum toont in plaats van een nieuwe gesynchroniseerde datum, wordt deze gemarkeerd met !.\n\nPraktische betekenis:\n- één synchronisatie per dag vóór het lezen is meestal voldoende\n- daarna blijven de statistieken de laatste geldige opgeslagen dag gebruiken\n- als de echte dag verandert, moet u opnieuw synchroniseren\n\nStandaard is de tijdzone \"Spanje / Madrid\". In Instellingen > Apps kunt u uw eigen tijdzone en datumnotatie selecteren."
STR_README_STATS_BODY: "Regels:\n- Je moet 1 keer per dag verbinding maken met wifi.\n- Er is minimaal 3 minuten lezen nodig voordat gegevens meetellen.\n\nOm statistieken te registreren moet eerst de dag worden vastgesteld.\n1. Stel de wifi-verbinding vooraf in.\n2. Druk 1 keer per dag (voor het lezen) op de knop Sync Day.\nNa Sync Day wordt alle activiteit aan die dag gekoppeld totdat je de volgende dag opnieuw op Sync Day drukt.\n3. Geniet van \"Reading Stats\", \"Reading Heatmap\".\n4. Optioneel. In \"Settings > Apps > Reading Stats\" kun je statistieken aanpassen, resetten en wijzigen.\n\nOptioneel: als je boeken zonder statistieken wilt, maak dan een map aan met de naam /ignore_stats/ en zet daar je EPUB's in."
STR_README_BOOKMARKS_BODY: "Terwijl een boek open is:\n- Als u de onderste OK-toets ingedrukt houdt, wordt de huidige pagina opgeslagen als bladwijzer.\n- Als u snel op dezelfde toets tikt, wordt een menu geopend zodat u snel bladwijzers kunt bekijken.\n- Om een ​​bladwijzer te verwijderen, houdt u dezelfde knop opnieuw ingedrukt terwijl de bladwijzer is geselecteerd."
STR_README_SLEEP_BODY: "Pas slaapschermen zo veel aan als je wilt.\nU kunt verschillende mappen hebben, kiezen welke u wilt gebruiken, langzaam door de afbeeldingen bladeren en zelfs beslissen of de volgorde willekeurig of opeenvolgend is.\n\nJe kunt extra mappen aanmaken zolang ze beginnen met sleep_, bijvoorbeeld: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "In Instellingen > Apps > Snelkoppelingen kun je:\n- kies welke apps worden getoond in Home of in Apps\n- verander de volgorde van elke app op beide schermen"
STR_README_ACHIEVEMENTS_BODY: "Vergeet niet om Sync Day elke dag te gebruiken, zodat de meeste prestaties correct kunnen worden bijgehouden.\nAchievements is een eenvoudig gamificatiesysteem met leesdoelen en mijlpalen om te ontgrendelen."
STR_README_IF_FOUND_BODY: "Een app die iemand helpt het apparaat terug te geven als het kwijtraakt.\n\nTypen op dit apparaat is pijnlijk, dus als u een bestand met de naam if_found.txt aan de SD-kaart toevoegt, wordt de inhoud ervan weergegeven wanneer deze app wordt geopend.\n\nJe kunt daar alles schrijven wat je wilt: een zin, een telefoonnummer, een e-mail..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
