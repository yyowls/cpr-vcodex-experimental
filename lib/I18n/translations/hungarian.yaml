STR_README: "ReadMe"
STR_README_APP_DESC: "Quick guide to key vCodex features"
STR_README_GITHUB_HINT: "More details on GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Customize Home and Apps"
STR_README_SYNC_DAY_BODY: "Sync Day keeps your date-based features on the right day.\n\nThis device may forget the real date after sleep, so Sync Day refreshes it over Wi-Fi.\n\nSimple use:\n- set Time Zone once\n- press Get Day before your first reading session of the day\n- Date Format only changes how the date looks\n- Display Day shows or hides the date in the header\n- SyncDay Reminder warns you after several starts without a fresh sync\n\nIf you skip Sync Day for too long, stats, streaks and achievements may be saved under the wrong day."
STR_README_STATS_BODY: "Reading Stats tracks time, sessions, finished books and goal days.\n\nImportant rules:\n- use Sync Day if you want date-based features to stay correct\n- a session needs at least 3 minutes before it counts\n\nUseful screens:\n- Reading Stats: totals and summary\n- Reading Heatmap: monthly calendar view\n- Reading Day: one specific day\n- Reading Profile: last 7 days\n\nUseful settings in Settings > Apps > Reading Stats:\n- Daily Goal changes the goal used by streaks and achievements\n- Show after reading opens the summary after a counted session\n- Export / Import / Reset let you manage the stats file\n\nOptional: books inside /ignore_stats/ are ignored by the stats system."
STR_README_PROFILE_BODY: "Reading Profile is a 7-day snapshot of your reading habits.\n\nIt scores four axes:\n- Habit: how often you read and met your daily goal\n- Stability: how evenly your reading was spread across the week\n- Engagement: how often you came back for another session\n- Depth: whether your sessions were mostly short, medium or long\n\nThe total score is only a summary. The four axes are what really explain your pattern."
STR_README_BOOKMARKS_BODY: "While a book is open:\n- If you hold the bottom OK key, the current page is saved as a bookmark.\n- If you tap the same key quickly, a menu opens so you can check bookmarks quickly.\n- To delete a bookmark, hold the same button again while the bookmark is selected."
STR_README_FAVORITES_BODY: "Favorites lets you pin books you want quick access to.\n\nHow it works:\n- open Favorites > Browse Files\n- move through folders like a normal file browser\n- each book can be marked or unmarked with the checkbox on the right\n\nManaging favorites:\n- Favorites > Order favorites lets you manually choose which books appear first\n- hold Select on a favorite there if you want to remove it, then confirm\n- there is no fixed limit on how many favorites you can keep\n\nOptional:\n- in Settings > Display > Carousel, choose Favorites if you want Home to show your first favorite books instead of recents."
STR_README_SLEEP_BODY: "Sleep lets you choose what the device shows while sleeping.\n\nYou can:\n- pick a sleep directory\n- preview images\n- choose random or sequential order\n- use folders whose names start with sleep_, such as sleep_books or sleep_manga\n\nIf you want different moods or themes, create more sleep_ folders and switch between them."
STR_README_SHORTCUTS_BODY: "In Settings > Apps > Shortcuts you can organize Home and Apps.\n\nYou can:\n- decide whether each app belongs to Home or Apps\n- show or hide each shortcut\n- change the order of items on both screens\n\nThis is the easiest way to keep the launcher simple."

STR_README_SETTINGS_BODY: "Some settings deserve a quick explanation:\n\nReader\n- Text Anti-Aliasing smooths text, but may cost a little speed\n- Text Darkness changes how dark text looks\n- Reader Refresh Mode changes the refresh style; Auto is the safe default\n- Font family and size usually matter more than UI theme for comfort\n\nApps\n- Display Day shows or hides the date in the header\n- Date Format only changes how the date is displayed\n- Daily Goal affects streaks, stats and achievements\n- Show after reading opens Reading Stats after a counted session\n- Enable achievements turns the achievement system on or off\n- Achievements popups only control unlock popups\n\nDisplay\n- UI Theme only changes the interface look"
STR_README_ACHIEVEMENTS_BODY: "Achievements reward milestones such as goal streaks, reading time, finished books and bookmarks.\n\nTo keep them correct, use Sync Day regularly, because achievements depend on the same day model as Reading Stats.\n\nUseful settings in Settings > Apps > Achievements:\n- Enable achievements turns the system on or off\n- Achievements popups decides whether unlock popups are shown\n- Sync with prev. stats rebuilds progress from your existing stats\n\nDaily Goal matters here too, because many achievements depend on goal days and goal streaks."
STR_README_IF_FOUND_BODY: "An app that helps someone return the device if it gets lost.\n\nTyping on this device is painful, so if you add a file called if_found.txt to the SD card, its content will be shown when this app is opened.\n\nYou can write anything you want there: a sentence, a phone number, an email..."
