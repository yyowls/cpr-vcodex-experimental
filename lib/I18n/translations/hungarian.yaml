STR_README_SYNC_DAY_BODY: "Az Xteink X4-et nem ?rdemes ?gy kezelni, mintha megb?zhat? val?s idej? ?r?ja lenne, amely alv?s ut?n is pontos marad. Ez?rt ez a fork egy gyakorlati modellt haszn?l:\n\n1. A Sync Day Wi-Fi-n kereszt?l csatlakozik, ?s NTP-vel lek?ri az aktu?lis d?tumot ?s id?t.\n2. Ez a d?tum lesz a statisztik?k ?rv?nyes referencia-napja.\n3. Ha az eszk?z k?s?bb elvesz?ti az ?rv?nyes aktu?lis ?r?t, a firmware a legut?bb mentett ?rv?nyes d?tumra ?ll vissza.\n4. Ha a fejl?c tartal?k d?tumot mutat frissen szinkroniz?lt helyett, azt ! jelzi.\n\nGyakorlati jelent?s:\n- ?ltal?ban napi egy szinkron olvas?s el?tt el?g\n- ezut?n a statisztik?k az utols? ?rv?nyes mentett napot haszn?lj?k\n- ha a val?di nap megv?ltozik, ism?t szinkroniz?lnod kell\n\nAlap?rtelmez?s szerint az id?z?na ?Spain / Madrid?. A saj?t id?z?n?t ?s a d?tumform?tumot a Be?ll?t?sok > Alkalmaz?sok alatt v?laszthatod ki."
STR_README_STATS_BODY: "Szab?lyok:\n- Naponta egyszer csatlakoznod kell Wi-Fi-re.\n- Az adatok sz?m?t?s?hoz legal?bb 3 perc olvas?s sz?ks?ges.\n\nA statisztik?k r?gz?t?s?hez a firmware-nek el?sz?r tudnia kell, hogy melyik nap van.\n1. ?ll?tsd be el?re a Wi-Fi-t.\n2. Olvas?s el?tt naponta egyszer nyomd meg a Sync Day gombot.\nA Sync Day ut?n minden olvas?si tev?kenys?g ahhoz a naphoz lesz r?gz?tve, am?g m?snap ?jra meg nem nyomod a Sync Day-t.\n3. Haszn?ld a ?Reading Stats?, ?Reading Heatmap? ?s ?Reading Day? funkci?kat.\n4. Opcion?lis. A ?Settings > Apps > Reading Stats? men?ben testre szabhatod, vissza?ll?thatod ?s kezelheted a statisztik?kat.\n\nOpcion?lis: ha szeretn?l statisztika n?lk?li k?nyveket, hozz l?tre egy /ignore_stats/ nev? mapp?t, ?s tedd oda az EPUB-okat."
STR_README_BOOKMARKS_BODY: "Am?g egy k?nyv nyitva van:\n- Ha lenyomva tartod az als? OK gombot, az aktu?lis oldal k?nyvjelz?k?nt ment?dik.\n- Ha gyorsan megnyomod ugyanazt a gombot, egy men? ny?lik meg, ahol gyorsan ellen?rizheted a k?nyvjelz?ket.\n- K?nyvjelz? t?rl?s?hez tartsd lenyomva ?jra ugyanazt a gombot, mik?zben a k?nyvjelz? ki van v?lasztva."
STR_README_SLEEP_BODY: "Az alv?k?perny?ket tetsz?s szerint testre szabhatod.\nT?bb k?l?nb?z? mapp?d lehet, kiv?laszthatod, melyiket haszn?lja, lassan v?giglapozhatod a k?peket, ?s azt is eld?ntheted, hogy a sorrend v?letlenszer? vagy szekvenci?lis legyen.\n\nL?trehozhatsz tov?bbi mapp?kat is, ha a nev?k sleep_-pel kezd?dik, p?ld?ul: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "A Be?ll?t?sok > Alkalmaz?sok > Parancsikonok men?ben a k?vetkez?ket teheted:\n- kiv?laszthatod, hogy az egyes alkalmaz?sok a F?k?perny?n vagy az Alkalmaz?sok k?z?tt jelenjenek meg\n- eld?ntheted, hogy az adott parancsikon l?that? vagy rejtett legyen\n- megv?ltoztathatod az alkalmaz?sok sorrendj?t mindk?t k?perny?n"
STR_README_ACHIEVEMENTS_BODY: "Ne felejtsd el naponta haszn?lni a Sync Day-t, hogy a legt?bb teljes?tm?ny helyesen k?vethet? legyen.\nA Teljes?tm?nyek egy egyszer? gamifik?ci?s rendszer olvas?si c?lokkal ?s feloldhat? m?rf?ldk?vekkel."
STR_README_IF_FOUND_BODY: "Ez az alkalmaz?s seg?t visszajuttatni az eszk?zt, ha elveszne.\n\nEzen az eszk?z?n k?nyelmetlen g?pelni, ez?rt ha hozz?adsz egy if_found.txt nev? f?jlt az SD-k?rty?hoz, annak tartalma megjelenik az alkalmaz?s megnyit?sakor.\n\nB?rmit ?rhatsz bele: egy mondatot, telefonsz?mot, e-mail c?met..."
