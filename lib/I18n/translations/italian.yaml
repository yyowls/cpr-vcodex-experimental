STR_README: "ReadMe"
STR_README_APP_DESC: "Guida rapida alle principali funzionalità di vCodex"
STR_README_GITHUB_HINT: "Maggiori dettagli su GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalizza Home e App"
STR_README_SYNC_DAY_BODY: "L'Xteink X4 non dovrebbe essere trattato come se avesse un orologio in tempo reale affidabile che sopravvive al sonno in modo affidabile. Quindi questo fork utilizza un modello pratico:\n\n1. Sync Day si connette tramite Wi-Fi e recupera la data/ora corrente utilizzando NTP.\n2. Quella data diventa il riferimento valido per le statistiche.\n3. Se in seguito il dispositivo perde un orologio corrente valido, il firmware torna all'ultima data valida salvata.\n4. Quando l'intestazione mostra una data di fallback anziché una nuova data di sincronizzazione, è contrassegnata con !.\n\nSignificato pratico:\n- Di solito è sufficiente una sincronizzazione al giorno prima della lettura\n- Successivamente, le statistiche continuano utilizzando l'ultimo giorno valido salvato\n- Se il giorno reale cambia, dovresti eseguire nuovamente la sincronizzazione\n\nPer impostazione predefinita, il fuso orario è \"Spagna/Madrid\". Puoi selezionare il tuo fuso orario e il formato della data in Impostazioni > App."
STR_README_STATS_BODY: "Regole:\n- Devi connetterti al Wi-Fi 1 volta al giorno.\n- Sono necessari almeno 3 minuti di lettura perché i dati vengano conteggiati.\n\nPer registrare le statistiche è necessario identificare il giorno.\n1. Configura prima la connessione Wi-Fi.\n2. Premi 1 volta al giorno, prima di leggere, il pulsante Sync Day.\nDopo Sync Day, tutta l'attività verrà registrata in quel giorno finché non premerai di nuovo Sync Day il giorno successivo.\n3. Goditi \"Reading Stats\" e \"Reading Heatmap\".\n4. Opzionale. In \"Settings > Apps > Reading Stats\" puoi personalizzare, reimpostare e modificare le statistiche.\n\nOpzionale: se vuoi libri senza statistiche, crea una cartella chiamata /ignore_stats/ e inserisci lì i tuoi EPUB."
STR_README_PROFILE_BODY: "Il Profilo di lettura è un'istantanea di 7 giorni delle tue abitudini di lettura.\n\nHa quattro assi:\n- Abitudini: quanto spesso leggi e hai raggiunto il tuo obiettivo quotidiano\n- Stabilità: quanto uniformemente è stata distribuita la tua lettura nel corso della settimana\n- Coinvolgimento: quanto spesso sei tornato per un'altra sessione\n- Profondità: se le tue sessioni sono state per lo più brevi, medie o lunghe\n\nIl punteggio totale è solo un riepilogo. I quattro assi sono ciò che realmente spiega il tuo modello."
STR_README_BOOKMARKS_BODY: "Mentre un libro è aperto:\n- Se si tiene premuto il tasto OK in basso, la pagina corrente viene salvata come segnalibro.\n- Se tocchi rapidamente lo stesso tasto, si apre un menu che ti consente di controllare rapidamente i segnalibri.\n- Per eliminare un segnalibro, tieni nuovamente premuto lo stesso pulsante mentre il segnalibro è selezionato."
STR_README_FAVORITES_BODY: "I Preferiti ti consentono di appuntare i libri a cui desideri accedere rapidamente.\n\nCome funziona:\n- apri Preferiti > Sfoglia file\n- spostarsi tra le cartelle come un normale browser di file\n- ogni libro può essere contrassegnato o deselezionato con la casella di controllo a destra\n\nGestione dei preferiti:\n- Preferiti > Ordina preferiti ti consente di scegliere manualmente quali libri visualizzare per primi\n- tieni premuto Seleziona su un preferito lì se vuoi rimuoverlo, quindi conferma\n- non esiste un limite fisso al numero di preferiti che puoi conservare\n\nFacoltativo:\n- in Impostazioni > Display > Carosello, scegli Preferiti se desideri che Home mostri i tuoi primi libri preferiti anziché quelli recenti."
STR_README_FLASHCARDS_BODY: "Flashcards studia i mazzi CSV memorizzati sulla scheda SD.\n\nSezioni principali:\n- Apri carica un mazzo dal magazzino\n- Recenti riapre i mazzi che hai utilizzato di recente\n- Le statistiche elencano i mazzi conosciuti e i loro progressi\n- Le impostazioni ti consentono di scegliere la modalità di studio e la dimensione della sessione\n\nModalità di studio:\n- Due crea una sessione di revisione finita partendo prima dalle carte dovute e poi dalle carte invisibili\n- La pianificazione programmata crea una sessione mescolata finita dall'intero mazzo\n- Infinito ignora le dimensioni della sessione e continua finché non esci manualmente\n\nCome funzionano le opzioni:\n- La modalità Studio decide quali carte entrano nella sessione\n- La dimensione della sessione decide quante di queste carte vengono utilizzate\n- Se la dimensione della sessione è Tutte, Due utilizza tutte le carte dovute più quelle invisibili, mentre Programmato utilizza l'intero mazzo\n\nDurante la revisione:\n- Flip scambia davanti e dietro\n- Successivamente salta la carta corrente senza segnare il punteggio\n- Il successo contrassegna la carta come corretta\n- Fail contrassegna la carta come fallita e la ripristina prima\n\nSe tieni premuto Seleziona su un mazzo in Statistiche, puoi eliminare le statistiche delle flashcard di quel mazzo dopo la conferma."
STR_README_SLEEP_BODY: "Personalizza le schermate del sonno quanto vuoi.\nPuoi avere diverse directory, scegliere quale utilizzare, sfogliare lentamente le immagini e persino decidere se l'ordine è casuale o sequenziale.\n\nPuoi creare cartelle aggiuntive purché inizino con sleep_, ad esempio: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "In Impostazioni > App > Scorciatoie puoi organizzare Home e App.\n\nPuoi:\n- decidere se ciascuna app appartiene alla Home o alle App\n- mostra o nascondi ogni scorciatoia\n- cambia l'ordine degli elementi su entrambi gli schermi\n\nQuesto è il modo più semplice per mantenere semplice il launcher."
STR_README_SETTINGS_BODY: "Alcune impostazioni meritano una breve spiegazione:\n\nLettore\n- L'anti-aliasing del testo uniforma il testo, ma può costare un po' di velocità\n- L'oscurità del testo modifica l'aspetto scuro del testo\n- La modalità di aggiornamento del lettore modifica lo stile di aggiornamento; Auto è l'impostazione predefinita sicura\n- Per comodità, la famiglia e le dimensioni dei caratteri in genere contano più del tema dell'interfaccia utente\n\nApplicazioni\n- Visualizza giorno mostra o nasconde la data nell'intestazione\n- Il formato della data cambia solo il modo in cui viene visualizzata la data\n- L'obiettivo giornaliero influisce su serie, statistiche e risultati\n- Mostra dopo la lettura apre le Statistiche di lettura dopo una sessione conteggiata\n- Abilita obiettivi attiva o disattiva il sistema degli obiettivi\n- I popup degli obiettivi controllano solo i popup di sblocco\n\nVisualizza\n- Il tema dell'interfaccia utente cambia solo l'aspetto dell'interfaccia"
STR_README_ACHIEVEMENTS_BODY: "Ricorda di utilizzare Sync Day ogni giorno in modo che la maggior parte degli obiettivi possa essere monitorata correttamente.\nAchievements è un semplice sistema di gamification con obiettivi di lettura e traguardi da sbloccare."
STR_README_IF_FOUND_BODY: "Un'app che aiuta qualcuno a restituire il dispositivo in caso di smarrimento.\n\nDigitare su questo dispositivo è doloroso, quindi se aggiungi un file chiamato if_found.txt alla scheda SD, il suo contenuto verrà mostrato all'apertura di questa app.\n\nPuoi scriverci quello che vuoi: una frase, un numero di telefono, un'e-mail..."
