STR_README: "ReadMe"
STR_README_APP_DESC: "Короткий посібник із основних функцій vCodex"
STR_README_GITHUB_HINT: "Детальніше на GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Налаштуйте головну сторінку та програми"
STR_README_SYNC_DAY_BODY: "Не варто розглядати Xteink X4 так, ніби він має надійний годинник реального часу, який надійно переживає сон. Отже, ця вилка використовує практичну модель:\n\n1. Sync Day підключається через Wi-Fi та отримує поточну дату/час за допомогою NTP.\n2. Ця дата стає дійсним посиланням для статистики.\n3. Якщо пізніше пристрій втратить дійсний поточний годинник, мікропрограма повернеться до останньої збереженої дійсної дати.\n4. Якщо в заголовку відображається резервна дата замість нової синхронізованої дати, вона позначається !.\n\nПрактичне значення:\n- зазвичай достатньо однієї синхронізації на день перед читанням\n- після цього статистика продовжує використовувати останній дійсний збережений день\n- якщо реальний день зміниться, вам слід синхронізувати знову\n\nЗа замовчуванням часовий пояс \"Іспанія / Мадрид\". Ви можете вибрати власний часовий пояс і формат дати в Налаштуваннях > Програми."
STR_README_STATS_BODY: "Правила:\n- Потрібно підключатися до Wi-Fi 1 раз на день.\n- Щоб дані зараховувалися, потрібно щонайменше 3 хвилини читання.\n\nЩоб записувати статистику, спочатку потрібно визначити день.\n1. Заздалегідь налаштуйте підключення до Wi-Fi.\n2. Натискайте кнопку Sync Day 1 раз на день (перед читанням).\nПісля Sync Day вся активність буде записуватися на цей день, доки наступного дня ви знову не натиснете Sync Day.\n3. Користуйтеся \"Reading Stats\", \"Reading Heatmap\".\n4. Додатково. У \"Settings > Apps > Reading Stats\" можна налаштовувати, скидати та змінювати статистику.\n\nДодатково: якщо ви хочете мати книги без статистики, створіть каталог з назвою /ignore_stats/ і помістіть туди свої EPUB."
STR_README_BOOKMARKS_BODY: "Поки книга відкрита:\n- Якщо утримувати нижню клавішу ОК, поточна сторінка буде збережена як закладка.\n- Якщо швидко натиснути ту саму клавішу, відкриється меню, у якому можна швидко перевірити закладки.\n- Щоб видалити закладку, утримуйте ту саму кнопку ще раз, поки закладку вибрано."
STR_README_SLEEP_BODY: "Налаштуйте екрани сну, скільки завгодно.\nВи можете мати різні каталоги, вибирати, який з них використовувати, повільно переглядати зображення та навіть вирішувати, який порядок буде випадковим чи послідовним.\n\nВи можете створювати додаткові папки, якщо вони починаються з sleep_, наприклад: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "У меню «Налаштування» > «Програми» > «Ярлики» ви можете:\n- виберіть, які програми відображатимуться на головному чи в додатках\n- змінити порядок будь-якої програми на обох екранах"
STR_README_ACHIEVEMENTS_BODY: "Не забудьте використовувати Sync Day щодня, щоб більшість досягнень можна було правильно відстежувати.\nДосягнення — це проста система гейміфікації з цілями читання та віхами для розблокування."
STR_README_IF_FOUND_BODY: "Додаток, який допомагає комусь повернути пристрій у разі його втрати.\n\nВведення тексту на цьому пристрої болісно, ​​тому якщо ви додасте файл if_found.txt на SD-карту, його вміст буде показано під час відкриття цієї програми.\n\nТам можна написати все, що завгодно: речення, номер телефону, електронну пошту..."
