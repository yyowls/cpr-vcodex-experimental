STR_README: "ReadMe"
STR_README_APP_DESC: "Trumpas pagrindinių vCodex funkcijų vadovas"
STR_README_GITHUB_HINT: "Daugiau informacijos GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Tinkinkite pagrindinį puslapį ir programas"
STR_README_SYNC_DAY_BODY: "Xteink X4 nereikėtų laikyti įrenginiu su patikimu realaus laiko laikrodžiu, kuris tiksliai veikia po miego režimo. Todėl šis fork naudoja praktišką modelį:\n\n1. Sync Day per Wi‑Fi prisijungia ir per NTP gauna dabartinę datą bei laiką.\n2. Ši data tampa galiojančia statistikos nuoroda.\n3. Jei vėliau įrenginys praranda galiojantį dabartinį laiką, programinė įranga grąžina paskutinę išsaugotą galiojančią datą.\n4. Kai antraštėje rodoma atsarginė data vietoje naujai sinchronizuotos, ji pažymima !.\n\nPraktinė reikšmė:\n- dažniausiai pakanka vienos sinchronizacijos per dieną prieš skaitant\n- po to statistika toliau naudoja paskutinę galiojančią išsaugotą dieną\n- jei pasikeičia tikroji diena, reikia sinchronizuoti iš naujo\n\nPagal numatytuosius nustatymus laiko juosta yra „Spain / Madrid“. Savo laiko juostą ir datos formatą galite pasirinkti Nustatymai > Programos."
STR_README_STATS_BODY: "Rules:\n- You need to connect to Wi-Fi once per day.\n- At least 3 minutes of reading are required before data is counted.\n\nTo record stats, the firmware first needs to know which day it is.\n1. Set up Wi-Fi beforehand.\n2. Press Sync Day once per day before reading.\nAfter Sync Day, all reading activity is recorded under that day until you press Sync Day again on the next day.\n3. Use \"Reading Stats\", \"Reading Heatmap\" and \"Reading Day\".\n4. Optional. In \"Settings > Apps > Reading Stats\" you can customize, reset and manage stats.\n\nOptional: if you want books without stats, create a directory called /ignore_stats/ and put those EPUBs there."
STR_README_PROFILE_BODY: "Skaitymo profilis – tai 7 dienų jūsų skaitymo įpročių apžvalga.\n\nJame skiriamos keturios ašys:\n- Įprotis: kaip dažnai skaitote ir pasiekėte savo dienos tikslą\n– Stabilumas: kaip tolygiai jūsų skaitymas pasiskirstė per savaitę\n- Sužadėtuvės: kaip dažnai grįžote į kitą seansą\n– Gylis: ar jūsų seansai dažniausiai buvo trumpi, vidutiniai ar ilgi\n\nBendras rezultatas yra tik santrauka. Keturios ašys iš tikrųjų paaiškina jūsų modelį."
STR_README_BOOKMARKS_BODY: "While a book is open:\n- If you hold the bottom OK key, the current page is saved as a bookmark.\n- If you tap the same key quickly, a menu opens so you can check bookmarks quickly.\n- To delete a bookmark, hold the same button again while the bookmark is selected."
STR_README_FAVORITES_BODY: "Parankiniai leidžia prisegti knygas, kurias norite greitai pasiekti.\n\nKaip tai veikia:\n- atidarykite Parankiniai > Naršyti failus\n- pereiti per aplankus kaip įprasta failų naršyklė\n- kiekviena knyga gali būti pažymėta arba nepažymėta dešinėje esančiu žymimuoju laukeliu\n\nTvarkyti mėgstamiausius:\n- Mėgstamiausi > Užsakyti parankinius leidžia rankiniu būdu pasirinkti, kurios knygos bus rodomos pirmiausia\n- palaikykite Pasirinkti ant mėgstamiausio, jei norite jį pašalinti, tada patvirtinkite\n- nėra fiksuoto limito, kiek mėgstamiausių galite pasilikti\n\nNeprivaloma:\n- Skiltyje „Nustatymai“ > „Ekranas“ > „Karuselė“ pasirinkite „Mėgstamiausi“, jei norite, kad „Home“ būtų rodomos pirmosios mėgstamiausios knygos, o ne naujausios."
STR_README_FLASHCARDS_BODY: "„Flashcards“ tiria SD kortelėje saugomus CSV paketus.\n\nPagrindinės skiltys:\n- Atidarytas įkelia denį iš saugyklos\n- Neseniai vėl atidaro denius, kuriuos neseniai naudojote\n- Statistikoje išvardijami žinomi deniai ir jų eiga\n- Nustatymai leidžia pasirinkti studijų režimą ir sesijos dydį\n\nStudijų režimai:\n– „Due“ sukuria baigtinę peržiūros seansą iš pirmiau nurodytų kortelių, o po to – nematytų kortelių\n- Suplanuotas sukuria baigtinį maišytą seansą iš visos denio\n- Infinite nepaiso seanso dydžio ir tęsia tol, kol išeisite rankiniu būdu\n\nKaip veikia parinktys:\n- Studijų režimas nusprendžia, kurios kortelės patenka į sesiją\n- Seanso dydis lemia, kiek tų kortelių bus panaudota\n- Jei seanso dydis yra „Visi“, „Due“ naudoja visas terminas ir nematytas korteles, o „Scheduled“ naudoja visą kaladę\n\nPeržiūrint:\n- Apverčiamas priekyje ir gale\n- Toliau praleidžia esamą kortelę neįvertindama jos\n- Sėkmė pažymi kortelę kaip teisingą\n- Fail pažymi kortelę kaip nepavykusią ir grąžina ją greičiau\n\nJei statistikoje laikysite paspaudę Pasirinkti, po patvirtinimo galėsite ištrinti tos kortelės statistiką."
STR_README_SLEEP_BODY: "Customize sleep screens as much as you want.\nYou can have different directories, choose which one to use, browse through the pictures slowly, and even decide whether the order is random or sequential.\n\nYou can create extra folders as long as they start with sleep_, for example: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Skiltyje Nustatymai > Programos > Spartieji klavišai galite tvarkyti pagrindinį puslapį ir programas.\n\nJūs galite:\n– nuspręskite, ar kiekviena programa priklauso „Home“, ar „Apps“\n- rodyti arba paslėpti kiekvieną nuorodą\n- pakeisti elementų tvarką abiejuose ekranuose\n\nTai lengviausias būdas, kad paleidimo priemonė būtų paprasta."
STR_README_SETTINGS_BODY: "Kai kurie nustatymai nusipelno greito paaiškinimo:\n\nSkaitytojas\n- Teksto apsaugos nuo slapyvardžio funkcija išlygina tekstą, bet gali kainuoti šiek tiek spartos\n- Teksto tamsumas keičia tamsaus teksto išvaizdą\n- Skaitytojo atnaujinimo režimas keičia atnaujinimo stilių; Automatinis yra saugus numatytasis nustatymas\n- Šriftų šeima ir dydis paprastai yra svarbesni už vartotojo sąsajos temą patogumui\n\nProgramos\n- Rodyti dieną rodo arba slepia datą antraštėje\n- Datos formatas keičia tik datos rodymo būdą\n- Dienos tikslas turi įtakos serijoms, statistikai ir pasiekimams\n- Rodyti po skaitymo atidaroma Skaitymo statistika po suskaičiuotos sesijos\n- Įgalinti pasiekimus įjungia arba išjungia pasiekimų sistemą\n- Pasiekimų iššokantieji langai valdo tik atrakinimo iššokančiuosius langus\n\nRodyti\n- UI tema keičia tik sąsajos išvaizdą"
STR_README_ACHIEVEMENTS_BODY: "Remember to use Sync Day every day so most achievements can be tracked correctly.\nAchievements is a simple gamification system with reading goals and milestones to unlock."
STR_README_IF_FOUND_BODY: "Programa, padedanti grąžinti įrenginį, jei jis pasimeta.\n\nRašyti šiame įrenginyje nėra patogu, todėl jei į SD kortelę pridėsite failą pavadinimu if_found.txt, jo turinys bus rodomas atidarius šią programą.\n\nTen galite parašyti ką norite: sakinį, telefono numerį, el. pašto adresą..."
