STR_README: "ReadMe"
STR_README_APP_DESC: "Краткое руководство по ключевым функциям vCodex"
STR_README_GITHUB_HINT: "Более подробная информация на GitHub @franssjz."
STR_README_TOPIC_SHORTCUTS: "Настройте дом и приложения"
STR_README_SYNC_DAY_BODY: "К Xteink X4 не следует относиться так, как будто у него есть надежные часы реального времени, которые надежно выдерживают спящий режим. Итак, эта вилка использует практическую модель:\n\n1. Sync Day подключается через Wi-Fi и получает текущую дату/время с помощью NTP.\n2. Эта дата становится действительной ссылкой для статистики.\n3. Если позже устройство потеряет действительные текущие часы, прошивка вернется к последней сохраненной действительной дате.\n4. Если в заголовке отображается резервная дата вместо новой синхронизированной даты, она помечается знаком !.\n\nПрактическое значение:\n- одной синхронизации в день перед чтением обычно достаточно\n- после этого статистика продолжает использовать последний действительный сохраненный день\n- если реальный день изменится, вам следует выполнить синхронизацию еще раз\n\nПо умолчанию часовой пояс «Испания/Мадрид». Вы можете выбрать свой собственный часовой пояс и формат даты в «Настройки» > «Приложения»."
STR_README_STATS_BODY: "Правила:\n- Нужно подключаться к Wi-Fi 1 раз в день.\n- Чтобы данные засчитывались, требуется минимум 3 минуты чтения.\n\nЧтобы записывать статистику, сначала нужно определить день.\n1. Заранее настройте подключение к Wi-Fi.\n2. Нажимайте кнопку Sync Day 1 раз в день (перед чтением).\nПосле Sync Day вся активность будет записываться на этот день, пока на следующий день вы снова не нажмёте Sync Day.\n3. Пользуйтесь \"Reading Stats\", \"Reading Heatmap\".\n4. Дополнительно. В \"Settings > Apps > Reading Stats\" можно настраивать, сбрасывать и изменять статистику.\n\nДополнительно: если вы хотите иметь книги без статистики, создайте каталог с именем /ignore_stats/ и поместите туда свои EPUB."
STR_README_PROFILE_BODY: "Профиль чтения – это снимок ваших привычек чтения за 7 дней.\n\nОн оценивается по четырем осям:\n- Привычка: как часто вы читаете и достигаете своей ежедневной цели\n- Стабильность: насколько равномерно ваше чтение было распределено в течение недели\n- Вовлеченность: как часто вы возвращались на следующий сеанс\n- Глубина: были ли ваши занятия в основном короткими, средними или длинными\n\nОбщий балл является лишь итоговым результатом. Четыре оси — это то, что действительно объясняет ваш паттерн."
STR_README_BOOKMARKS_BODY: "Пока книга открыта:\n- Если удерживать нижнюю клавишу ОК, текущая страница сохраняется как закладка.\n- Если вы быстро нажмете ту же клавишу, откроется меню, в котором вы сможете быстро проверить закладки.\n- Чтобы удалить закладку, снова удерживайте ту же кнопку, пока закладка выбрана."
STR_README_FAVORITES_BODY: "Избранное позволяет закреплять книги, к которым нужен быстрый доступ.\n\nКак это работает:\n- откройте «Избранное» > «Просмотр файлов» \n- перемещаться по папкам как в обычном файловом браузере\n- каждую книгу можно отметить или снять с помощью флажка справа\n\nУправление избранным:\n- Избранное > Упорядочить избранное позволяет вручную выбирать, какие книги будут появляться первыми\n- там удерживайте Select на избранном, если хотите его удалить, затем подтвердите\n- нет фиксированного ограничения на количество избранных, которые вы можете сохранить\n\nНеобязательно:\n- В меню «Настройки» > «Дисплей» > «Карусель» выберите «Избранное», если хотите, чтобы на «Домой» показывались ваши первые любимые книги, а не недавние."
STR_README_FLASHCARDS_BODY: "Flashcards изучает колоды CSV, хранящиеся на SD-карте.\n\nОсновные разделы:\n- Открыть загрузку колоды из хранилища\n- «Недавние» повторно открывает колоды, которые вы недавно использовали\n- В статистике перечислены известные колоды и их прогресс\n- Настройки позволяют выбрать режим обучения и размер сеанса\n\nРежимы обучения:\n- Due создает ограниченный сеанс проверки из карточек сроков в первую очередь, а затем из невидимых карточек\n- По расписанию строит конечный перетасованный сеанс из всей колоды\n- Infinite игнорирует размер сеанса и продолжает работать, пока вы не выйдете вручную\n\nКак работают опции:\n- Режим обучения определяет, какие карты будут участвовать в сеансе\n- Размер сеанса определяет, сколько из этих карт будет использовано\n- Если размер сеанса равен «Все», «Срок» использует все подлежащие оплате плюс непросмотренные карты, а «Запланировано» использует всю колоду\n\nВо время просмотра:\n- Перевернуть местами спереди и сзади\n- Далее пропускает текущую карту, не засчитывая ее\n- При успехе карта помечается как правильная\n- Неудача помечает карту как неудавшуюся и возвращает ее раньше\n\nЕсли вы удерживаете кнопку «Выбрать» на колоде в разделе «Статистика», вы можете удалить статистику карточки этой колоды после подтверждения."
STR_README_SLEEP_BODY: "Настраивайте экраны сна по своему усмотрению.\nВы можете иметь разные каталоги, выбирать, какой из них использовать, медленно просматривать изображения и даже решать, является ли порядок случайным или последовательным.\n\nВы можете создавать дополнительные папки, если они начинаются с Sleep_, например: Sleep_books, Sleep_Geek, Sleep_Disney, Sleep_manga..."
STR_README_SHORTCUTS_BODY: "В «Настройки» > «Приложения» > «Ярлыки» вы можете упорядочить «Дом» и «Приложения».\n\nВы можете:\n- решить, принадлежит ли каждое приложение домашней странице или приложениям\n- показать или скрыть каждый ярлык\n- изменить порядок элементов на обоих экранах\n\nЭто самый простой способ сделать программу запуска простой."
STR_README_SETTINGS_BODY: "Некоторые настройки заслуживают краткого объяснения:\n\nЧитатель\n- Сглаживание текста сглаживает текст, но может снизить скорость\n- «Темнота текста» меняет внешний вид темного текста\n- Режим обновления Reader меняет стиль обновления; Авто — безопасное значение по умолчанию\n- Семейство и размер шрифта обычно имеют большее значение, чем тема пользовательского интерфейса для комфорта\n\nПриложения\n- Отображение дня показывает или скрывает дату в заголовке\n- Формат даты меняет только способ отображения даты\n- Ежедневная цель влияет на серии, статистику и достижения\n- Показать после чтения открывает статистику чтения после подсчитанного сеанса\n- Включить достижения включает или выключает систему достижений\n- Всплывающие окна достижений управляют только всплывающими окнами разблокировки\n\nДисплей\n- Тема пользовательского интерфейса меняет только внешний вид интерфейса."
STR_README_ACHIEVEMENTS_BODY: "Не забывайте использовать Sync Day каждый день, чтобы можно было правильно отслеживать большинство достижений.\nДостижения — это простая система геймификации с чтением целей и этапов, которые нужно разблокировать."
STR_README_IF_FOUND_BODY: "Приложение, которое поможет вернуть устройство, если оно потеряется.\n\nПечатать на этом устройстве неудобно, поэтому, если вы добавите файл if_found.txt на SD-карту, его содержимое будет отображаться при открытии этого приложения.\n\nВы можете написать там все, что захотите: предложение, номер телефона, адрес электронной почты..."
