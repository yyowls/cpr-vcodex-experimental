STR_README_TOPIC_SHORTCUTS: "Přizpůsobte si domov a aplikace"
STR_README_SYNC_DAY_BODY: "S Xteink X4 by se nemělo zacházet, jako by měl spolehlivé hodiny reálného času, které spolehlivě přežijí spánek. Tato vidlice tedy používá praktický model:\n\n1. Sync Day se připojí přes Wi-Fi a načte aktuální datum/čas pomocí NTP.\n2. Toto datum se stává platnou referencí pro statistiky.\n3. Pokud zařízení později ztratí platné aktuální hodiny, firmware se vrátí k poslednímu uloženému platnému datu.\n4. Pokud je v záhlaví uvedeno záložní datum místo nového synchronizovaného data, je označeno !.\n\nPraktický význam:\n- obvykle stačí jedna synchronizace za den před čtením\n- poté budou statistiky nadále používat poslední platný uložený den\n- pokud se změní skutečný den, měli byste synchronizovat znovu\n\nVe výchozím nastavení je časové pásmo „Španělsko / Madrid“. Vlastní časové pásmo a formát data si můžete vybrat v Nastavení > Aplikace."
STR_README_STATS_BODY: "Pravidla:\n- K Wi‑Fi se musíš připojit 1× denně.\n- Aby se data započítala, je potřeba alespoň 3 minuty čtení.\n\nAby bylo možné zaznamenávat statistiky, je nejprve nutné určit den.\n1. Předem nastav připojení k Wi‑Fi.\n2. Stiskni 1× denně (před čtením) tlačítko Sync Day.\nPo Sync Day bude veškerá aktivita zaznamenávána do daného dne, dokud následující den znovu nestiskneš Sync Day.\n3. Užij si \"Reading Stats\", \"Reading Heatmap\".\n4. Volitelné. V \"Settings > Apps > Reading Stats\" můžeš statistiky přizpůsobit, resetovat a upravovat.\n\nVolitelné: pokud chceš mít knihy bez statistik, vytvoř adresář s názvem /ignore_stats/ a vlož tam své EPUBy."
STR_README_BOOKMARKS_BODY: "Když je kniha otevřená:\n- Pokud podržíte spodní tlačítko OK, aktuální stránka se uloží jako záložka.\n- Pokud rychle klepnete na stejnou klávesu, otevře se nabídka, abyste mohli rychle zkontrolovat záložky.\n- Chcete-li záložku odstranit, podržte stejné tlačítko znovu, když je záložka vybrána."
STR_README_SLEEP_BODY: "Přizpůsobte si obrazovky spánku, jak chcete.\nMůžete mít různé adresáře, vybrat si, který chcete použít, pomalu procházet obrázky a dokonce se rozhodnout, zda je pořadí náhodné nebo sekvenční.\n\nMůžete vytvářet další složky, pokud začínají na sleep_, například: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "V Nastavení > Aplikace > Zkratky můžete:\n- vyberte, které aplikace se zobrazí na ploše nebo v aplikacích\n- změnit pořadí libovolné aplikace na obou obrazovkách"
STR_README_ACHIEVEMENTS_BODY: "Nezapomeňte používat Den synchronizace každý den, aby bylo možné správně sledovat většinu úspěchů.\nAchievements je jednoduchý systém gamifikace s cíli čtení a milníky, které je třeba odemknout."
STR_README_IF_FOUND_BODY: "Aplikace, která pomáhá někomu vrátit zařízení, pokud se ztratí.\n\nPsaní na tomto zařízení je bolestivé, takže pokud na SD kartu přidáte soubor s názvem if_found.txt, jeho obsah se zobrazí při otevření této aplikace.\n\nMůžete si tam napsat cokoli chcete: větu, telefonní číslo, email..."
