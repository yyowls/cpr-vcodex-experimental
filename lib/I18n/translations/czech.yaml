STR_README_TOPIC_SHORTCUTS: "Přizpůsobte si domov a aplikace"
STR_README_SYNC_DAY_BODY: "S Xteink X4 by se nemělo zacházet, jako by měl spolehlivé hodiny reálného času, které spolehlivě přežijí spánek. Tato vidlice tedy používá praktický model:\n\n1. Sync Day se připojí přes Wi-Fi a načte aktuální datum/čas pomocí NTP.\n2. Toto datum se stává platnou referencí pro statistiky.\n3. Pokud zařízení později ztratí platné aktuální hodiny, firmware se vrátí k poslednímu uloženému platnému datu.\n4. Pokud je v záhlaví uvedeno záložní datum místo nového synchronizovaného data, je označeno !.\n\nPraktický význam:\n- obvykle stačí jedna synchronizace za den před čtením\n- poté budou statistiky nadále používat poslední platný uložený den\n- pokud se změní skutečný den, měli byste synchronizovat znovu\n\nVe výchozím nastavení je časové pásmo „Španělsko / Madrid“. Vlastní časové pásmo a formát data si můžete vybrat v Nastavení > Aplikace."
STR_README_STATS_BODY: "Pravidla:\n- K Wi‑Fi se musíš připojit 1× denně.\n- Aby se data započítala, je potřeba alespoň 3 minuty čtení.\n\nAby bylo možné zaznamenávat statistiky, je nejprve nutné určit den.\n1. Předem nastav připojení k Wi‑Fi.\n2. Stiskni 1× denně (před čtením) tlačítko Sync Day.\nPo Sync Day bude veškerá aktivita zaznamenávána do daného dne, dokud následující den znovu nestiskneš Sync Day.\n3. Užij si \"Reading Stats\", \"Reading Heatmap\".\n4. Volitelné. V \"Settings > Apps > Reading Stats\" můžeš statistiky přizpůsobit, resetovat a upravovat.\n\nVolitelné: pokud chceš mít knihy bez statistik, vytvoř adresář s názvem /ignore_stats/ a vlož tam své EPUBy."
STR_README_PROFILE_BODY: "Profil čtení je 7denní přehled vašich čtenářských návyků.\n\nMá čtyři osy:\n- Zvyk: jak často čtete a jak dosahujete svého denního cíle\n- Stabilita: jak rovnoměrně bylo vaše čtení rozloženo do týdne\n- Zapojení: jak často jste se vrátili na další sezení\n- Hloubka: zda byly vaše relace většinou krátké, střední nebo dlouhé\n\nCelkové skóre je pouze souhrn. Čtyři osy jsou to, co skutečně vysvětluje váš vzorec."
STR_README_BOOKMARKS_BODY: "Když je kniha otevřená:\n- Pokud podržíte spodní tlačítko OK, aktuální stránka se uloží jako záložka.\n- Pokud rychle klepnete na stejnou klávesu, otevře se nabídka, abyste mohli rychle zkontrolovat záložky.\n- Chcete-li záložku odstranit, podržte stejné tlačítko znovu, když je záložka vybrána."
STR_README_FAVORITES_BODY: "Oblíbené vám umožňují připnout knihy, ke kterým chcete mít rychlý přístup.\n\nJak to funguje:\n- otevřete Oblíbené > Procházet soubory\n- procházet složkami jako běžný prohlížeč souborů\n- každou knihu lze označit nebo odznačit zaškrtávacím políčkem vpravo\n\nSpráva oblíbených:\n- Oblíbené > Objednat oblíbené vám umožňuje ručně vybrat, které knihy se zobrazí jako první\n- podržte Vybrat u oblíbené položky, pokud ji chcete odstranit, a poté potvrďte\n- neexistuje žádný pevný limit, kolik oblíbených si můžete ponechat\n\nVolitelné:\n- V Nastavení > Displej > Karusel vyberte Oblíbené, pokud chcete, aby se na domovské stránce zobrazovaly vaše první oblíbené knihy místo posledních."
STR_README_FLASHCARDS_BODY: "Flashcards studuje balíčky CSV uložené na kartě SD.\n\nHlavní sekce:\n- Otevřít načte balíček z úložiště\n- Nedávné znovu otevře balíčky, které jste nedávno použili\n- Statistika uvádí známé balíčky a jejich postup\n- Nastavení vám umožní vybrat režim studia a velikost relace\n\nStudijní režimy:\n- Due vytvoří relaci konečného přezkoumání z prvních a neviditelných karet jako první\n- Scheduled vytvoří konečnou zamíchanou relaci z celého balíčku\n- Infinite ignoruje velikost relace a pokračuje, dokud ručně neodejdete\n\nJak fungují možnosti:\n- Studijní režim rozhoduje o tom, které karty vstoupí do relace\n- Velikost relace rozhoduje o tom, kolik z těchto karet bude použito\n- Pokud je velikost relace All, Due použije všechny splatné plus neviditelné karty a Scheduled použije celý balíček\n\nPři kontrole:\n- Flip prohození přední a zadní části\n- Další přeskočí aktuální kartu, aniž by ji ohodnotil\n- Úspěch označí kartu jako správnou\n- Selhání označí kartu jako neúspěšnou a vrátí ji dříve\n\nPokud podržíte Select na balíčku ve Statistikách, můžete po potvrzení smazat statistiky karty daného balíčku."
STR_README_SLEEP_BODY: "Přizpůsobte si obrazovky spánku, jak chcete.\nMůžete mít různé adresáře, vybrat si, který chcete použít, pomalu procházet obrázky a dokonce se rozhodnout, zda je pořadí náhodné nebo sekvenční.\n\nMůžete vytvářet další složky, pokud začínají na sleep_, například: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "V Nastavení > Aplikace > Zkratky můžete uspořádat plochu a aplikace.\n\nMůžete:\n- rozhodnout, zda každá aplikace patří do oblasti Home nebo Apps\n- zobrazit nebo skrýt každou zkratku\n- změnit pořadí položek na obou obrazovkách\n\nToto je nejjednodušší způsob, jak udržet spouštěč jednoduchý."
STR_README_SETTINGS_BODY: "Některá nastavení si zaslouží rychlé vysvětlení:\n\nČtenář\n- Vyhlazování textu vyhlazuje text, ale může stát trochu rychlosti\n- Tmavost textu mění vzhled tmavého textu\n- Reader Refresh Mode mění styl aktualizace; Auto je bezpečné výchozí nastavení\n– Rodina písem a velikost obvykle záleží na pohodlí více než na motivu uživatelského rozhraní\n\nAplikace\n- Zobrazit den zobrazí nebo skryje datum v záhlaví\n- Formát data mění pouze způsob zobrazení data\n- Denní cíl ovlivňuje série, statistiky a úspěchy\n- Zobrazit po přečtení otevře Statistiky čtení po započítané relaci\n- Povolit úspěchy zapne nebo vypne systém úspěchů\n- Vyskakovací okna s úspěchy ovládají pouze vyskakovací okna pro odemknutí\n\nZobrazit\n- Motiv uživatelského rozhraní mění pouze vzhled rozhraní"
STR_README_ACHIEVEMENTS_BODY: "Nezapomeňte používat Den synchronizace každý den, aby bylo možné správně sledovat většinu úspěchů.\nAchievements je jednoduchý systém gamifikace s cíli čtení a milníky, které je třeba odemknout."
STR_README_IF_FOUND_BODY: "Aplikace, která pomáhá někomu vrátit zařízení, pokud se ztratí.\n\nPsaní na tomto zařízení je bolestivé, takže pokud na SD kartu přidáte soubor s názvem if_found.txt, jeho obsah se zobrazí při otevření této aplikace.\n\nMůžete si tam napsat cokoli chcete: větu, telefonní číslo, email..."
