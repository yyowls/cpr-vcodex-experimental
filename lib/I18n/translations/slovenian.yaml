STR_README_TOPIC_SHORTCUTS: "Prilagodi Domov in Aplikacije"
STR_README_SYNC_DAY_BODY: "Xteink X4 ne bi smel veljati za napravo z zanesljivo pravo uro, ki bi po spanju ostala verodostojna. Zato ta fork uporablja praktičen model:\n\n1. Sync Day se poveže prek Wi-Fi in prek NTP pridobi trenutni datum in čas.\n2. Ta datum postane veljavna referenca za statistiko.\n3. Če naprava pozneje izgubi veljavno trenutno uro, se vdelana programska oprema vrne na zadnji shranjeni veljavni datum.\n4. Ko glava prikazuje nadomestni datum namesto sveže sinhroniziranega datuma, je označen z !.\n\nPraktični pomen:\n- ena sinhronizacija na dan pred branjem je navadno dovolj\n- po tem statistika še naprej uporablja zadnji veljavni shranjeni dan\n- če se pravi dan spremeni, moraš sinhronizirati znova\n\nPrivzeti časovni pas je \"Spain / Madrid\". Svoj časovni pas in obliko datuma lahko izbereš v Nastavitve > Aplikacije."
STR_README_STATS_BODY: "Pravila:\n- Z Wi-Fi se moraš povezati enkrat na dan.\n- Podatki se štejejo šele po vsaj 3 minutah branja.\n\nDa se statistika zabeleži, mora vdelana programska oprema najprej vedeti, kateri dan je.\n1. Vnaprej nastavi Wi-Fi.\n2. Enkrat na dan pred branjem pritisni Sync Day.\nPo Sync Day se vsa bralna dejavnost beleži pod tem dnem, dokler naslednji dan znova ne pritisneš Sync Day.\n3. Uporabljaj \"Statistika branja\", \"Toplotni zemljevid branja\" in \"Bralni dan\".\n4. Izbirno. V \"Nastavitve > Aplikacije > Statistika branja\" lahko statistiko prilagajaš, ponastavljaš in upravljaš.\n\nIzbirno: če želiš knjige brez statistike, ustvari mapo /ignore_stats/ in vanjo shrani te EPUB-e."
STR_README_BOOKMARKS_BODY: "Ko je knjiga odprta:\n- Če držiš spodnjo tipko OK, se trenutna stran shrani kot zaznamek.\n- Če isto tipko na hitro pritisneš, se odpre meni, da lahko zaznamke hitro preveriš.\n- Če želiš zaznamek izbrisati, znova drži isti gumb, ko je zaznamek izbran."
STR_README_SLEEP_BODY: "Zaslone za spanje lahko prilagodiš po svoje.\nLahko imaš različne mape, izbereš katero boš uporabljal, počasi pregleduješ slike in se celo odločiš, ali bo vrstni red naključen ali zaporeden.\n\nUstvariš lahko dodatne mape, če se začnejo s sleep_, na primer: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "V Nastavitve > Aplikacije > Bližnjice lahko:\n- izbereš, ali posamezna aplikacija spada v Domov ali Aplikacije\n- izbereš, ali je posamezna bližnjica prikazana ali skrita\n- spremeniš vrstni red aplikacij na obeh zaslonih"
STR_README_ACHIEVEMENTS_BODY: "Ne pozabi vsak dan uporabiti Sync Day, da bo večina dosežkov pravilno spremljana.\nDosežki so preprost sistem igrifikacije z bralnimi cilji in mejniki, ki jih lahko odkleneš."
STR_README_IF_FOUND_BODY: "Aplikacija, ki pomaga nekomu vrniti napravo, če se izgubi.\n\nTipkanje na tej napravi je mučno, zato bo ob odprtju te aplikacije prikazana vsebina datoteke if_found.txt na kartici SD, če jo dodaš.\n\nTja lahko zapišeš karkoli želiš: stavek, telefonsko številko, e-pošto..."
