STR_README_TOPIC_SHORTCUTS: "Ana Sayfayı ve Uygulamaları Özelleştirin"
STR_README_SYNC_DAY_BODY: "Xteink X4'e, uykuda güvenilir bir şekilde hayatta kalabilen güvenilir bir gerçek zamanlı saate sahipmiş gibi davranılmamalıdır. Yani bu çatal pratik bir model kullanıyor:\n\n1. Sync Day, Wi-Fi üzerinden bağlanır ve NTP'yi kullanarak geçerli tarih/saati getirir.\n2. Bu tarih, istatistikler için geçerli referans haline gelir.\n3. Cihaz daha sonra geçerli geçerli saati kaybederse, cihaz yazılımı en son kaydedilen geçerli tarihe geri döner.\n4. Başlık, yeni senkronize edilmiş tarih yerine bir geri dönüş tarihi gösteriyorsa, ! ile işaretlenir.\n\nPratik anlamı:\n- okumadan önce günde bir senkronizasyon genellikle yeterlidir\n- bundan sonra istatistikler son geçerli kayıtlı günü kullanmaya devam eder\n- gerçek gün değişirse yeniden senkronizasyon yapmalısınız\n\nVarsayılan olarak saat dilimi \"İspanya / Madrid\"dir. Ayarlar > Uygulamalar bölümünde kendi saat diliminizi ve tarih biçiminizi seçebilirsiniz."
STR_README_STATS_BODY: "Kurallar:\n- Günde 1 kez Wi‑Fi'ye bağlanman gerekir.\n- Verilerin sayılması için en az 3 dakika okuma gerekir.\n\nİstatistikleri kaydedebilmek için önce günün belirlenmesi gerekir.\n1. Wi‑Fi bağlantısını önceden ayarla.\n2. Günde 1 kez (okumadan önce) Sync Day düğmesine bas.\nSync Day'den sonra tüm etkinlik, ertesi gün yeniden Sync Day'e basana kadar o gün altında kaydedilir.\n3. \"Reading Stats\", \"Reading Heatmap\" keyfini çıkar.\n4. İsteğe bağlı. \"Settings > Apps > Reading Stats\" içinde istatistikleri özelleştirebilir, sıfırlayabilir ve değiştirebilirsin.\n\nİsteğe bağlı: istatistiksiz kitaplar istiyorsan /ignore_stats/ adlı bir dizin oluştur ve EPUB dosyalarını oraya koy."
STR_README_BOOKMARKS_BODY: "Bir kitap açıkken:\n- Alttaki OK tuşunu basılı tutarsanız geçerli sayfa yer imi olarak kaydedilir.\n- Aynı tuşa hızlı bir şekilde dokunursanız, yer imlerini hızlı bir şekilde kontrol edebilmeniz için bir menü açılır.\n- Bir yer imini silmek için, yer imi seçiliyken aynı düğmeyi tekrar basılı tutun."
STR_README_SLEEP_BODY: "Uyku ekranlarını istediğiniz kadar özelleştirin.\nFarklı dizinlere sahip olabilir, hangisini kullanacağınızı seçebilir, resimlere yavaşça göz atabilir ve hatta sıranın rastgele mi yoksa sıralı mı olacağına karar verebilirsiniz.\n\nSleep_ ile başladıkları sürece ekstra klasörler oluşturabilirsiniz, örneğin: uyku_kitapları, uyku_geek, uyku_disney, uyku_manga..."
STR_README_SHORTCUTS_BODY: "Ayarlar > Uygulamalar > Kısayollar'da şunları yapabilirsiniz:\n- Ana Sayfa'da veya Uygulamalar'da hangi uygulamaların gösterileceğini seçin\n- her iki ekranda da herhangi bir uygulamanın sırasını değiştirin"
STR_README_ACHIEVEMENTS_BODY: "Çoğu başarının doğru bir şekilde takip edilebilmesi için Senkronizasyon Günü'nü her gün kullanmayı unutmayın.\nBaşarılar, okuma hedeflerini ve kilidini açacak kilometre taşlarını içeren basit bir oyunlaştırma sistemidir."
STR_README_IF_FOUND_BODY: "Kaybolması durumunda birisinin cihazı iade etmesine yardımcı olan bir uygulama.\n\nBu cihazda yazmak zahmetlidir, bu nedenle SD karta if_found.txt adlı bir dosya eklerseniz içeriği bu uygulama açıldığında gösterilecektir.\n\nOraya istediğiniz her şeyi yazabilirsiniz: bir cümle, bir telefon numarası, bir e-posta..."
