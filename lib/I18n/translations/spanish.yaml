STR_README: "ReadMe"
STR_README_APP_DESC: "Guia rapida de funciones clave de vCodex"
STR_README_GITHUB_HINT: "Mas detalles en GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalizar Home y Apps"
STR_README_SYNC_DAY_BODY: "Sync Day mantiene las funciones basadas en fecha en el dia correcto.\n\nEste dispositivo puede olvidar la fecha real despues del reposo, asi que Sync Day la refresca por Wi-Fi.\n\nUso simple:\n- configura una vez la zona horaria\n- pulsa Get Day antes de tu primera sesion de lectura del dia\n- Date Format solo cambia como se ve la fecha\n- Display Day muestra u oculta la fecha en el encabezado\n- SyncDay Reminder avisa tras varios inicios sin una sincronizacion reciente\n\nSi dejas pasar demasiado tiempo sin Sync Day, stats, rachas y logros pueden guardarse en el dia incorrecto."
STR_README_STATS_BODY: "Reading Stats registra tiempo, sesiones, libros terminados y dias de objetivo cumplido.\n\nReglas importantes:\n- usa Sync Day si quieres que las funciones basadas en fecha sigan siendo correctas\n- una sesion necesita al menos 3 minutos para contar\n\nPantallas utiles:\n- Reading Stats: totales y resumen\n- Reading Heatmap: vista mensual de calendario\n- Reading Day: un dia concreto\n- Reading Profile: ultimos 7 dias\n\nOpciones utiles en Settings > Apps > Reading Stats:\n- Daily Goal cambia la meta usada por rachas y logros\n- Show after reading abre el resumen tras una sesion contada\n- Export / Import / Reset te permiten gestionar el fichero de stats\n\nOpcional: los libros dentro de /ignore_stats/ quedan fuera del sistema de stats."
STR_README_PROFILE_BODY: "El perfil de lectura es una instantánea de 7 días de tus hábitos de lectura.\n\nPuntúa cuatro ejes:\n- Hábito: con qué frecuencia lees y alcanzas tu objetivo diario\n- Estabilidad: qué tan repartida estuvo tu lectura a lo largo de la semana\n- Compromiso: con qué frecuencia volviste para otra sesión\n- Profundidad: si tus sesiones fueron sobre todo cortas, medias o largas\n\nLa puntuación total es solo un resumen. Lo que de verdad explica tu patrón son los cuatro ejes."
STR_README_BOOKMARKS_BODY: "Cuando tengas un libro abierto:\n- Si mantienes pulsada la tecla inferior de OK, guardas la pagina actual como marcador.\n- Si haces un clic rapido en la misma tecla, se abre un menu para consultar rapidamente los marcadores.\n- Para borrar un marcador, vuelve a mantener pulsado el mismo boton cuando el marcador este seleccionado."
STR_README_FAVORITES_BODY: "Favoritos te permite fijar libros a los que quieres acceder rápido.\n\nCómo funciona:\n- abre Favoritos > Explorar archivos\n- muévete por carpetas como en un explorador de archivos normal\n- cada libro puede marcarse o desmarcarse con la casilla de la derecha\n\nGestionar favoritos:\n- Favoritos > Ordenar favoritos te permite elegir manualmente qué libros aparecen primero\n- mantén pulsado Seleccionar sobre un favorito si quieres quitarlo y luego confirma\n- no hay un límite fijo de favoritos\n\nOpcional:\n- en Configuración > Pantalla > Carrusel, elige Favoritos si quieres que Inicio muestre tus libros favoritos principales en lugar de los recientes."
STR_README_FLASHCARDS_BODY: "Flashcards estudia mazos CSV almacenados en la tarjeta SD.\n\nSecciones principales:\n- Abrir carga un mazo desde el almacenamiento\n- Recientes vuelve a abrir mazos usados hace poco\n- Estadísticas muestra los mazos conocidos y su progreso\n- Configuración permite elegir el modo de estudio y el tamaño de la sesión\n\nModos de estudio:\n- Due crea una sesión finita usando primero las tarjetas vencidas y luego las no vistas\n- Scheduled crea una sesión finita y mezclada a partir de todo el mazo\n- Infinite ignora el tamaño de la sesión y continúa hasta que salgas manualmente\n\nCómo funcionan las opciones:\n- el modo de estudio decide qué tarjetas entran en la sesión\n- el tamaño de la sesión decide cuántas de esas tarjetas se usan\n- si el tamaño de la sesión es Todo, Due usa todas las vencidas más las no vistas, y Scheduled usa todo el mazo\n\nDurante el repaso:\n- Flip cambia entre anverso y reverso\n- Siguiente salta la tarjeta actual sin puntuarla\n- Acierto marca la tarjeta como correcta\n- Fallo marca la tarjeta como fallida y la hace volver antes\n\nSi mantienes pulsado Seleccionar sobre un mazo dentro de Estadísticas, puedes borrar las estadísticas de ese mazo tras confirmar."
STR_README_SLEEP_BODY: "Sleep te permite elegir que muestra el dispositivo mientras duerme.\n\nPuedes:\n- elegir un directorio de reposo\n- previsualizar imagenes\n- usar orden aleatorio o secuencial\n- utilizar carpetas cuyo nombre empiece por sleep_, como sleep_books o sleep_manga\n\nSi quieres distintos estilos o ambientes, crea mas carpetas sleep_ y cambia entre ellas."
STR_README_SHORTCUTS_BODY: "En Configuración > Aplicaciones > Accesos directos puedes organizar Inicio y Aplicaciones.\n\nPuedes:\n- decidir si cada aplicación pertenece a Inicio o Aplicaciones\n- mostrar u ocultar cada acceso directo\n- cambiar el orden de los elementos en ambas pantallas\n\nEs la forma más sencilla de mantener el lanzador claro."
STR_README_SETTINGS_BODY: "Algunos ajustes merecen una explicación rápida:\n\nLector\n- El suavizado de texto hace el texto más suave, pero puede costar un poco de velocidad\n- La oscuridad del texto cambia el aspecto del texto oscuro\n- El modo de refresco del lector cambia el estilo de actualización; Auto es la opción segura por defecto\n- La familia y el tamaño de la fuente suelen importar más que el tema de la interfaz para la comodidad\n\nAplicaciones\n- Mostrar día enseña u oculta la fecha en el encabezado\n- El formato de fecha solo cambia cómo se muestra la fecha\n- El objetivo diario afecta a rachas, estadísticas y logros\n- Mostrar después de leer abre Estadísticas de lectura tras una sesión contada\n- Habilitar logros activa o desactiva el sistema de logros\n- Las ventanas emergentes de logros solo controlan los avisos de desbloqueo\n\nPantalla\n- El tema de la interfaz solo cambia el aspecto visual de la interfaz."
STR_README_ACHIEVEMENTS_BODY: "Achievements premia hitos como rachas de objetivo, tiempo de lectura, libros terminados y marcadores.\n\nPara que sean correctos, conviene usar Sync Day con regularidad, porque los logros dependen del mismo modelo de fecha que Reading Stats.\n\nOpciones utiles en Settings > Apps > Achievements:\n- Enable achievements activa o desactiva el sistema\n- Achievements popups decide si se muestran ventanas emergentes al desbloquear\n- Sync with prev. stats reconstruye el progreso a partir de tus stats actuales\n\nDaily Goal tambien importa aqui, porque muchos logros dependen de dias y rachas de objetivo."
STR_README_IF_FOUND_BODY: "Una app para que, en caso de perdida, alguien pueda ver datos de contacto e intentar devolver el dispositivo.\n\nEscribir desde este dispositivo es horrible, asi que si anades a la tarjeta SD un fichero llamado if_found.txt, su contenido se mostrara al abrir esta app.\n\nPuedes poner lo que quieras: una frase, un telefono, un correo electronico..."
