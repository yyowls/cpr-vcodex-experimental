STR_README_APP_DESC: "Guía rápida de funciones clave de vCodex"
STR_README_GITHUB_HINT: "Más detalles en GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalizar Home y Apps"
STR_README_SYNC_DAY_BODY: "El Xteink X4 no debe tratarse como si tuviera un reloj en tiempo real fiable que sobreviva al reposo de forma confiable. Por eso este fork usa un modelo práctico:\n\n1. Sync Day se conecta por Wi-Fi y obtiene la fecha y hora actuales usando NTP.\n2. Esa fecha pasa a ser la referencia válida para las estadísticas.\n3. Si más tarde el dispositivo pierde un reloj actual válido, el firmware recurre a la última fecha válida guardada.\n4. Cuando el encabezado muestra una fecha de respaldo en lugar de una fecha recién sincronizada, se marca con !.\n\nEn la práctica:\n- normalmente basta con una sincronización al día antes de leer\n- después, las estadísticas siguen usando el último día válido guardado\n- si cambia el día real, deberías sincronizar de nuevo\n\nPor defecto la zona horaria es \"Spain / Madrid\". Puedes seleccionar tu propia zona horaria e incluso el formato de fecha desde Settings > Apps."
STR_README_STATS_BODY: "Reglas:\n- ¡Necesitas conectarte al Wi-Fi 1 vez al día!\n- Mínimo 3 minutos de lectura para contabilizar datos.\n\nPara poder registrar estadísticas es necesario identificar el día.\n1. Configura previamente la conexión por Wi-Fi.\n2. Pulsa 1 vez al día (antes de leer) el botón Sync Day.\nDespués de Sync Day toda la actividad se registrará a ese día hasta que vuelvas a pulsar Sync Day al día siguiente.\n3. Disfruta de \"Reading Stats\", \"Reading Heatmap\" y \"Reading Day\".\n4. Opcional. En \"Settings > Apps > Reading Stats\" podrás personalizar, reiniciar y modificar las estadísticas.\n\nOpcional: si deseas tener libros sin estadísticas, es decir, que se ignore el registro de stats, crea un directorio llamado /ignore_stats/ y pon allí tus EPUB."
STR_README_BOOKMARKS_BODY: "Cuando tengas un libro abierto:\n- Si mantienes pulsada la tecla inferior de OK, guardarás la página actual como marcador.\n- Si haces un clic rápido en la misma tecla, se abrirá un menú para consultar rápidamente los marcadores.\n- Para borrar un marcador, vuelve a mantener pulsado el mismo botón cuando el marcador esté seleccionado."
STR_README_SLEEP_BODY: "Personaliza al máximo las pantallas de reposo.\nPuedes tener diferentes directorios, seleccionar cuál quieres usar, navegar lentamente entre las fotos e incluso indicar si quieres que sigan un orden aleatorio o secuencial.\n\nPuedes crear carpetas adicionales siempre que empiecen por sleep_, por ejemplo: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "En Settings > Apps > Shortcuts podrás:\n- indicar si cada app pertenece a Home o a Apps\n- indicar si cada acceso directo se muestra o queda oculto\n- alterar el orden de las apps en ambas pantallas"
STR_README_ACHIEVEMENTS_BODY: "Recuerda usar Sync Day cada día para que la mayoría de los logros se registren correctamente.\nLogros es un sistema simple de gamificación con metas e hitos de lectura por desbloquear."
STR_README_IF_FOUND_BODY: "Una app para que, en caso de pérdida, alguien pueda ver datos de contacto e intentar devolver el dispositivo.\n\nEscribir desde este dispositivo es horrible, así que si añades a la tarjeta SD un fichero llamado if_found.txt, su contenido se mostrará al abrir esta app.\n\nPuedes poner lo que quieras: una frase, un teléfono, un correo electrónico..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
