STR_README: "ReadMe"
STR_README_APP_DESC: "Hurtig guide til vigtige vCodex-funktioner"
STR_README_GITHUB_HINT: "Flere detaljer om GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Tilpas Home og Apps"
STR_README_SYNC_DAY_BODY: "Xteink X4 skal ikke behandles, som om den havde et pålideligt realtidsur, der overlever søvn på en pålidelig måde. Så denne gaffel bruger en praktisk model:\n\n1. Sync Day opretter forbindelse via Wi-Fi og henter den aktuelle dato/tid ved hjælp af NTP.\n2. Denne dato bliver den gyldige reference for statistik.\n3. Hvis enheden senere mister et gyldigt aktuelt ur, falder firmwaren tilbage til den sidst gemte gyldige dato.\n4. Når overskriften viser en reservedato i stedet for en ny synkroniseret dato, er den markeret med !.\n\nPraktisk betydning:\n- en synkronisering om dagen før læsning er normalt nok\n- derefter fortsætter statistikken med at bruge den sidste gyldige gemte dag\n- hvis den rigtige dag ændrer sig, bør du synkronisere igen\n\nSom standard er tidszonen \"Spanien / Madrid\". Du kan vælge din egen tidszone og datoformat i Indstillinger > Apps."
STR_README_STATS_BODY: "Regler:\n- Du skal forbinde til Wi‑Fi 1 gang om dagen.\n- Der kræves mindst 3 minutters læsning, før data tæller.\n\nFor at registrere statistik er det nødvendigt først at identificere dagen.\n1. Konfigurer Wi‑Fi-forbindelsen på forhånd.\n2. Tryk 1 gang om dagen (før du læser) på knappen Sync Day.\nEfter Sync Day registreres al aktivitet på den dag, indtil du trykker på Sync Day igen næste dag.\n3. Nyd \"Reading Stats\", \"Reading Heatmap\".\n4. Valgfrit. I \"Settings > Apps > Reading Stats\" kan du tilpasse, nulstille og ændre statistikken.\n\nValgfrit: hvis du vil have bøger uden statistik, så opret en mappe med navnet /ignore_stats/ og læg dine EPUB-filer der."
STR_README_BOOKMARKS_BODY: "Mens en bog er åben:\n- Hvis du holder den nederste OK-tast nede, gemmes den aktuelle side som et bogmærke.\n- Hvis du trykker hurtigt på den samme tast, åbnes en menu, så du hurtigt kan tjekke bogmærker.\n- For at slette et bogmærke skal du holde den samme knap nede igen, mens bogmærket er valgt."
STR_README_SLEEP_BODY: "Tilpas søvnskærme så meget du vil.\nDu kan have forskellige mapper, vælge hvilken du vil bruge, gennemse billederne langsomt og endda beslutte, om rækkefølgen er tilfældig eller sekventiel.\n\nDu kan oprette ekstra mapper, så længe de starter med sleep_, for eksempel: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "I Indstillinger > Apps > Genveje kan du:\n- vælg, hvilke apps der skal vises i Home eller i Apps\n- ændre rækkefølgen af enhver app på begge skærme"
STR_README_ACHIEVEMENTS_BODY: "Husk at bruge Sync Day hver dag, så de fleste præstationer kan spores korrekt.\nAchievements er et simpelt gamification-system med læsemål og milepæle at låse op."
STR_README_IF_FOUND_BODY: "En app, der hjælper nogen med at returnere enheden, hvis den bliver væk.\n\nDet er smertefuldt at skrive på denne enhed, så hvis du tilføjer en fil kaldet if_found.txt til SD-kortet, vil dens indhold blive vist, når denne app åbnes.\n\nDu kan skrive alt, hvad du vil der: en sætning, et telefonnummer, en e-mail..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
STR_README_REPORTS_SUGGESTIONS_BODY: "https://github.com/franssjz/cpr-vcodex\n\nu/franssjz7 (reddit)"
