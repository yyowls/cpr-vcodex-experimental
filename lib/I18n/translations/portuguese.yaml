STR_README: "ReadMe"
STR_README_APP_DESC: "Guia rápido para os principais recursos do vCodex"
STR_README_GITHUB_HINT: "Mais detalhes no GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalize a página inicial e os aplicativos"
STR_README_SYNC_DAY_BODY: "O Xteink X4 não deve ser tratado como se tivesse um relógio confiável em tempo real que sobrevive ao sono de maneira confiável. Portanto, este garfo usa um modelo prático:\n\n1. O Sync Day se conecta via Wi-Fi e busca a data/hora atual usando NTP.\n2. Essa data passa a ser a referência válida para estatísticas.\n3. Se o dispositivo perder posteriormente um relógio atual válido, o firmware volta para a última data válida salva.\n4. Quando o cabeçalho mostra uma data substituta em vez de uma nova data sincronizada, ele é marcado com!.\n\nSignificado prático:\n- uma sincronização por dia antes da leitura geralmente é suficiente\n- depois disso, as estatísticas continuam usando o último dia salvo válido\n- se o dia real mudar, você deverá sincronizar novamente\n\nPor padrão o fuso horário é \"Espanha/Madrid\". Você pode selecionar seu próprio fuso horário e formato de data em Configurações > Aplicativos."
STR_README_STATS_BODY: "Regras:\n- É necessário ligar-se ao Wi‑Fi 1 vez por dia.\n- É preciso ler pelo menos 3 minutos para que os dados contem.\n\nPara registar estatísticas é necessário identificar o dia.\n1. Configure previamente a ligação Wi‑Fi.\n2. Prima 1 vez por dia (antes de ler) o botão Sync Day.\nDepois de Sync Day, toda a atividade será registada nesse dia até voltar a premir Sync Day no dia seguinte.\n3. Desfrute de \"Reading Stats\", \"Reading Heatmap\".\n4. Opcional. Em \"Settings > Apps > Reading Stats\" poderá personalizar, repor e modificar as estatísticas.\n\nOpcional: se quiser livros sem estatísticas, crie uma pasta chamada /ignore_stats/ e coloque lá os seus EPUB."
STR_README_PROFILE_BODY: "O Perfil de leitura é um instantâneo de 7 dias dos seus hábitos de leitura.\n\nEle pontua quatro eixos:\n- Hábito: quantas vezes você leu e atingiu sua meta diária\n- Estabilidade: quão uniformemente sua leitura foi distribuída ao longo da semana\n- Engajamento: quantas vezes você voltou para outra sessão\n- Profundidade: se suas sessões foram em sua maioria curtas, médias ou longas\n\nA pontuação total é apenas um resumo. Os quatro eixos são o que realmente explicam o seu padrão."
STR_README_BOOKMARKS_BODY: "Enquanto um livro está aberto:\n- Se você mantiver pressionada a tecla OK inferior, a página atual será salva como marcador.\n- Se você tocar rapidamente na mesma tecla, um menu será aberto para que você possa verificar os favoritos rapidamente.\n- Para excluir um marcador, mantenha pressionado o mesmo botão novamente enquanto o marcador estiver selecionado."
STR_README_FAVORITES_BODY: "Favoritos permite que você fixe livros aos quais deseja acesso rápido.\n\nComo funciona:\n- abra Favoritos > Navegar pelos arquivos\n- percorrer pastas como um navegador de arquivos normal\n- cada livro pode ser marcado ou desmarcado com a caixa de seleção à direita\n\nGerenciando favoritos:\n- Favoritos > Ordenar favoritos permite escolher manualmente quais livros aparecem primeiro\n- segure Selecionar em um favorito se quiser removê-lo e confirme\n- não há limite fixo de quantos favoritos você pode manter\n\nOpcional:\n- em Configurações > Tela > Carrossel, escolha Favoritos se quiser que a Página inicial mostre seus primeiros livros favoritos em vez dos recentes."
STR_README_FLASHCARDS_BODY: "Flashcards estuda decks CSV armazenados no cartão SD.\n\nSeções principais:\n- Abrir carrega um deck do armazenamento\n- Recentes reabre decks que você usou recentemente\n- Estatísticas listam decks conhecidos e seu progresso\n- Configurações permitem escolher o modo de estudo e o tamanho da sessão\n\nModos de estudo:\n- Due cria uma sessão de revisão finita a partir dos cartões devidos primeiro e depois dos cartões não vistos\n- Agendado constrói uma sessão finita embaralhada de todo o baralho\n- Infinite ignora o tamanho da sessão e continua até você sair manualmente\n\nComo funcionam as opções:\n- O modo de estudo decide quais cartas entram na sessão\n- O tamanho da sessão decide quantos desses cartões serão usados\n- Se o tamanho da sessão for Todos, o Vencido usa todas as cartas vencidas e as não vistas, e o Agendado usa o baralho inteiro\n\nDurante a revisão:\n- Flip troca frente e verso\n- Em seguida, pula o cartão atual sem pontuá-lo\n- O sucesso marca o cartão como correto\n- Fail marca o cartão como falhou e o traz de volta mais cedo\n\nSe você segurar Selecionar em um baralho dentro de Estatísticas, poderá excluir as estatísticas do cartão de memória desse baralho após a confirmação."
STR_README_SLEEP_BODY: "Personalize as telas de suspensão o quanto quiser.\nVocê pode ter diretórios diferentes, escolher qual usar, navegar pelas imagens aos poucos e até decidir se a ordem é aleatória ou sequencial.\n\nVocê pode criar pastas extras desde que comecem com sleep_, por exemplo: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Em Configurações > Aplicativos > Atalhos você pode organizar a Página inicial e os Aplicativos.\n\nVocê pode:\n- decida se cada aplicativo pertence à página inicial ou aos aplicativos\n- mostrar ou ocultar cada atalho\n- alterar a ordem dos itens nas duas telas\n\nEsta é a maneira mais fácil de manter o inicializador simples."
STR_README_SETTINGS_BODY: "Algumas configurações merecem uma rápida explicação:\n\nLeitor\n- Text Anti-Aliasing suaviza o texto, mas pode custar um pouco de velocidade\n- Text Darkness altera a aparência do texto escuro\n- Modo de atualização do leitor altera o estilo de atualização; Auto é o padrão seguro\n- A família e o tamanho da fonte geralmente são mais importantes do que o tema da interface do usuário para maior conforto\n\nAplicativos\n- Exibir Dia mostra ou oculta a data no cabeçalho\n- O formato da data altera apenas a forma como a data é exibida\n- A meta diária afeta sequências, estatísticas e conquistas\n- Mostrar após a leitura abre Estatísticas de leitura após uma sessão contada\n- Habilitar conquistas ativa ou desativa o sistema de conquistas\n- Os pop-ups de conquistas controlam apenas os pop-ups de desbloqueio\n\nExibição\n- O tema UI altera apenas a aparência da interface"
STR_README_ACHIEVEMENTS_BODY: "Lembre-se de usar o Sync Day todos os dias para que a maioria das conquistas possa ser rastreada corretamente.\nConquistas é um sistema de gamificação simples com metas de leitura e marcos para desbloquear."
STR_README_IF_FOUND_BODY: "Um aplicativo que ajuda alguém a devolver o dispositivo caso ele seja perdido.\n\nDigitar neste dispositivo é doloroso, portanto, se você adicionar um arquivo chamado if_found.txt ao cartão SD, seu conteúdo será mostrado quando este aplicativo for aberto.\n\nVocê pode escrever o que quiser: uma frase, um número de telefone, um e-mail..."
