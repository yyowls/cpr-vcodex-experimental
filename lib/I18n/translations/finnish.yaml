STR_README_TOPIC_SHORTCUTS: "Mukauta etusivua ja sovelluksia"
STR_README_SYNC_DAY_BODY: "Xteink X4:ää ei pidä kohdella ikään kuin siinä olisi luotettava reaaliaikainen kello, joka selviää unesta luotettavalla tavalla. Joten tämä haarukka käyttää käytännöllistä mallia:\n\n1. Synkronointipäivä muodostaa yhteyden Wi-Fin kautta ja hakee nykyisen päivämäärän/ajan NTP:n avulla.\n2. Tästä päivämäärästä tulee tilastojen kelvollinen viite.\n3. Jos laite myöhemmin menettää voimassa olevan kellon, laiteohjelmisto palautuu viimeksi tallennettuun voimassa olevaan päivämäärään.\n4. Kun otsikossa näkyy varapäivämäärä uuden synkronointipäivämäärän sijaan, se on merkitty !:llä.\n\nKäytännön merkitys:\n- Yleensä yksi synkronointi päivässä ennen lukemista riittää\n- sen jälkeen tilastot käyttävät viimeistä voimassa olevaa tallennettua päivää\n- Jos todellinen päivä muuttuu, sinun tulee synkronoida uudelleen\n\nOletusarvoisesti aikavyöhyke on \"Espanja / Madrid\". Voit valita oman aikavyöhykkeesi ja päivämäärämuodon kohdassa Asetukset > Sovellukset."
STR_README_STATS_BODY: "Säännöt:\n- Sinun täytyy muodostaa Wi‑Fi-yhteys kerran päivässä.\n- Tietojen laskeminen edellyttää vähintään 3 minuutin lukemista.\n\nTilastojen kirjaaminen edellyttää, että päivä tunnistetaan.\n1. Määritä Wi‑Fi-yhteys etukäteen.\n2. Paina kerran päivässä (ennen lukemista) Sync Day -painiketta.\nSync Dayn jälkeen kaikki toiminta kirjataan kyseiselle päivälle, kunnes painat Sync Dayta uudelleen seuraavana päivänä.\n3. Nauti \"Reading Stats\"-, \"Reading Heatmap\"- ja \"Reading Day\" -toiminnoista.\n4. Valinnainen. Kohdassa \"Settings > Apps > Reading Stats\" voit mukauttaa, nollata ja muokata tilastoja.\n\nValinnainen: jos haluat kirjoja ilman tilastoja, luo hakemisto nimeltä /ignore_stats/ ja laita EPUB-tiedostosi sinne."
STR_README_BOOKMARKS_BODY: "Kun kirja on auki:\n- Jos pidät alempaa OK-näppäintä painettuna, nykyinen sivu tallennetaan kirjanmerkiksi.\n- Jos painat samaa näppäintä nopeasti, valikko avautuu, jotta voit tarkistaa kirjanmerkit nopeasti.\n- Voit poistaa kirjanmerkin pitämällä samaa painiketta uudelleen painettuna, kun kirjanmerkki on valittuna."
STR_README_SLEEP_BODY: "Mukauta lepotilanäyttöjä niin paljon kuin haluat.\nSinulla voi olla erilaisia ​​hakemistoja, valita kumpaa haluat käyttää, selata kuvia hitaasti ja jopa päättää, onko järjestys satunnainen vai peräkkäinen.\n\nVoit luoda ylimääräisiä kansioita, kunhan ne alkavat sanalla sleep_, esimerkiksi: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Kohdassa Asetukset > Sovellukset > Pikakuvakkeet voit:\n- Valitse, mitkä sovellukset näkyvät aloitussivulla tai sovelluksissa\n- Muuta minkä tahansa sovelluksen järjestystä molemmilla näytöillä"
STR_README_ACHIEVEMENTS_BODY: "Muista käyttää Synkronointipäivää joka päivä, jotta useimmat saavutukset voidaan seurata oikein.\nAchievements on yksinkertainen pelillistämisjärjestelmä, jossa on lukutavoitteita ja virstanpylväitä avattavaksi."
STR_README_IF_FOUND_BODY: "Sovellus, joka auttaa jotakuta palauttamaan laitteen, jos se katoaa.\n\nKirjoittaminen tällä laitteella on tuskallista, joten jos lisäät SD-kortille tiedoston nimeltä if_found.txt, sen sisältö näytetään, kun tämä sovellus avataan.\n\nVoit kirjoittaa sinne mitä haluat: lauseen, puhelinnumeron, sähköpostin..."
